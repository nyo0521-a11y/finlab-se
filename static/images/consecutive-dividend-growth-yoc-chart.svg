<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" role="img" aria-label="連続増配株と高配当株の実質利回り推移比較">
  <rect width="800" height="450" fill="#fafafa"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2937">連続増配株と高配当株：20年間の実質利回り（YOC）推移</text>

  <!-- Plot area background -->
  <rect x="80" y="60" width="680" height="320" fill="#ffffff" stroke="#e5e7eb"/>

  <!-- Y gridlines & labels -->
  <g stroke="#eef2f7" stroke-width="1">
    <line x1="80" y1="320" x2="760" y2="320"/>
    <line x1="80" y1="260" x2="760" y2="260"/>
    <line x1="80" y1="200" x2="760" y2="200"/>
    <line x1="80" y1="140" x2="760" y2="140"/>
    <line x1="80" y1="80"  x2="760" y2="80"/>
  </g>
  <g font-size="12" fill="#6b7280" text-anchor="end">
    <text x="72" y="384">0</text>
    <text x="72" y="324">2</text>
    <text x="72" y="264">4</text>
    <text x="72" y="204">6</text>
    <text x="72" y="144">8</text>
    <text x="72" y="84">10</text>
  </g>

  <!-- Axes -->
  <line x1="80" y1="380" x2="760" y2="380" stroke="#374151" stroke-width="1.5"/>
  <line x1="80" y1="60"  x2="80"  y2="380" stroke="#374151" stroke-width="1.5"/>

  <!-- X labels -->
  <g font-size="12" fill="#6b7280" text-anchor="middle">
    <text x="80"  y="400">0</text>
    <text x="250" y="400">5</text>
    <text x="420" y="400">10</text>
    <text x="590" y="400">15</text>
    <text x="760" y="400">20</text>
  </g>

  <!-- Axis labels -->
  <text x="420" y="424" text-anchor="middle" font-size="13" fill="#374151">保有年数（年）</text>
  <text x="28" y="220" text-anchor="middle" font-size="13" fill="#374151" transform="rotate(-90 28 220)">実質利回り（％）</text>

  <!-- High-yield horizontal line at 5% -->
  <line x1="80" y1="230" x2="760" y2="230" stroke="#9ca3af" stroke-width="2.5" stroke-dasharray="6 4"/>

  <!-- Progressive dividend curve (3% start, +5%/yr) -->
  <polyline fill="none" stroke="#2563eb" stroke-width="3"
    points="80,290 148,280.7 216,270.5 284,259.4 352,247.1 420,233.3 488,218.3 556,201.8 624,183.5 692,163.4 760,141.2"/>

  <!-- Key points on curve -->
  <g fill="#2563eb">
    <circle cx="80"  cy="290" r="4"/>
    <circle cx="420" cy="233.3" r="4"/>
    <circle cx="760" cy="141.2" r="4"/>
  </g>

  <!-- Point labels -->
  <g font-size="12" fill="#1e3a8a">
    <text x="92"  y="284">スタート 3.0%</text>
    <text x="432" y="227">10年後 約4.9%</text>
    <text x="752" y="135" text-anchor="end">20年後 約8.0%</text>
  </g>

  <!-- Crossover annotation -->
  <line x1="420" y1="233" x2="420" y2="380" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="420" y="395" text-anchor="middle" font-size="11" fill="#6b7280">10年付近で逆転</text>

  <!-- Legend -->
  <g font-size="13">
    <rect x="500" y="68" width="252" height="52" fill="#ffffff" stroke="#e5e7eb"/>
    <line x1="514" y1="86" x2="546" y2="86" stroke="#2563eb" stroke-width="3"/>
    <text x="554" y="90" fill="#1f2937">連続増配株（3％開始・年5％増配）</text>
    <line x1="514" y1="108" x2="546" y2="108" stroke="#9ca3af" stroke-width="2.5" stroke-dasharray="6 4"/>
    <text x="554" y="112" fill="#1f2937">高配当株（利回り5％・増配なし）</text>
  </g>

  <!-- Footer note -->
  <text x="400" y="444" text-anchor="middle" font-size="11" fill="#9ca3af">※株価変動を除く、取得価額に対する配当利回り（YOC）の概念図</text>
</svg>
