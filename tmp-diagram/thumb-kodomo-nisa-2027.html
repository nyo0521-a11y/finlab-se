<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1376px;
    height: 800px;
    overflow: hidden;
    font-family: "Hiragino Kaku Gothic Pro", "Noto Sans JP", "Yu Gothic", sans-serif;
    position: relative;
    background: #050c23;
  }

  /* Chrome headlessが底辺を約20px切るため body=800px で撮影後に上768pxをクロップ */
  .bg-img {
    position: absolute;
    left: 0;
    top: 0;
    width: 1376px;
    height: 768px;
  }

  /* 左側グラデーションオーバーレイ（テキスト可読性確保） */
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 1376px;
    height: 768px;
    background: linear-gradient(
      to right,
      rgba(5, 12, 35, 0.90) 0%,
      rgba(5, 12, 35, 0.78) 40%,
      rgba(5, 12, 35, 0.20) 65%,
      transparent 80%
    );
  }

  /* テキストエリア */
  .text-area {
    position: absolute;
    top: 0;
    left: 0;
    width: 680px;
    height: 768px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 56px;
    gap: 0;
  }

  /* カテゴリバッジ */
  .badge {
    display: inline-block;
    background: transparent;
    border: 2px solid #22d3ee;
    color: #22d3ee;
    font-size: 18px;
    font-weight: bold;
    padding: 5px 18px;
    border-radius: 20px;
    letter-spacing: 0.05em;
    margin-bottom: 22px;
    width: fit-content;
  }

  /* メインタイトル */
  .title {
    font-size: 72px;
    font-weight: bold;
    color: #ffffff;
    line-height: 1.2;
    margin-bottom: 20px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.7);
    letter-spacing: -0.01em;
  }

  /* サブタイトル */
  .subtitle {
    font-size: 22px;
    color: rgba(255,255,255,0.82);
    line-height: 1.55;
    border-left: 4px solid #22d3ee;
    padding-left: 14px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.6);
  }
</style>
</head>
<body>
  <img class="bg-img" src="file:///C:/Users/oui_k/OneDrive/finlab-se/static/images/thumb-kodomo-nisa-2027-base.png">
  <div class="overlay"></div>
  <div class="text-area">
    <span class="badge">金融ニュース</span>
    <div class="title">こどもNISA<br>創設決定</div>
    <div class="subtitle">ジュニアNISAとの違いと<br>今すぐできる準備</div>
  </div>
</body>
</html>
