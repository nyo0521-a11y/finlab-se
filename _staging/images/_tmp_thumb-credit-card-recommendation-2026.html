<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1376px;
    height: 768px;
    background: #0d1b2a;
    font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
    overflow: hidden;
    position: relative;
  }
  /* 背景グラデーション */
  .bg-gradient {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 80% 50%, #0a2540 0%, #0d1b2a 60%);
  }
  /* 右側カード画像エリア */
  .card-area {
    position: absolute;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
    width: 600px;
    height: 680px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* カード1（背面） */
  .credit-card-back {
    position: absolute;
    width: 340px;
    height: 215px;
    background: linear-gradient(135deg, #1a3a5c 0%, #0f2640 100%);
    border-radius: 18px;
    transform: rotate(-12deg) translate(80px, -60px);
    box-shadow: 0 0 30px rgba(0, 200, 255, 0.3), 0 0 60px rgba(0, 150, 200, 0.15);
    border: 1px solid rgba(0, 200, 255, 0.4);
  }
  /* カード2（前面メイン） */
  .credit-card-front {
    position: absolute;
    width: 360px;
    height: 228px;
    background: linear-gradient(135deg, #1e4080 0%, #0f2855 50%, #0a1f40 100%);
    border-radius: 18px;
    transform: rotate(5deg) translate(-20px, 30px);
    box-shadow: 0 0 40px rgba(0, 220, 255, 0.4), 0 0 80px rgba(0, 180, 220, 0.2), 0 20px 60px rgba(0,0,0,0.5);
    border: 1.5px solid rgba(0, 220, 255, 0.6);
    overflow: hidden;
  }
  .credit-card-front::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0, 220, 255, 0.8), transparent);
  }
  .credit-card-front::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0, 220, 255, 0.5), transparent);
  }
  .card-chip {
    position: absolute;
    top: 50px;
    left: 30px;
    width: 44px;
    height: 34px;
    background: linear-gradient(135deg, #c8a84b 0%, #f0d060 50%, #b8941e 100%);
    border-radius: 5px;
    box-shadow: 0 2px 8px rgba(200, 168, 75, 0.4);
  }
  .card-number {
    position: absolute;
    bottom: 55px;
    left: 25px;
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    letter-spacing: 3px;
    font-family: monospace;
  }
  .card-logo {
    position: absolute;
    bottom: 20px;
    right: 25px;
    display: flex;
    gap: 4px;
  }
  .card-logo-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    opacity: 0.8;
  }
  /* コイン */
  .coin {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f5d060 0%, #d4a017 60%, #a07010 100%);
    box-shadow: 0 2px 8px rgba(200, 168, 20, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(0,0,0,0.4);
    font-weight: bold;
  }
  .coin1 { width: 52px; height: 52px; top: 80px; right: 80px; font-size: 18px; }
  .coin2 { width: 36px; height: 36px; top: 200px; right: 40px; font-size: 13px; }
  .coin3 { width: 44px; height: 44px; bottom: 150px; right: 120px; font-size: 16px; }
  /* スパークル */
  .sparkle {
    position: absolute;
    color: rgba(0, 220, 255, 0.7);
    font-size: 20px;
  }
  .sp1 { top: 60px; right: 200px; }
  .sp2 { top: 160px; right: 55px; }
  .sp3 { bottom: 120px; right: 170px; }
  /* 左テキストエリア */
  .text-area {
    position: absolute;
    left: 60px;
    top: 50%;
    transform: translateY(-50%);
    width: 680px;
  }
  /* カテゴリバッジ */
  .category-badge {
    display: inline-block;
    border: 1.5px solid rgba(0, 200, 255, 0.7);
    color: rgba(0, 200, 255, 0.9);
    font-size: 14px;
    padding: 4px 14px;
    border-radius: 4px;
    margin-bottom: 22px;
    letter-spacing: 1px;
  }
  /* メインタイトル */
  .main-title {
    color: #ffffff;
    font-size: 78px;
    font-weight: 900;
    line-height: 1.15;
    margin-bottom: 28px;
    text-shadow: 0 0 30px rgba(0, 200, 255, 0.2);
    white-space: nowrap;
  }
  /* サブタイトル */
  .subtitle-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .subtitle-bar {
    width: 3px;
    height: 44px;
    background: linear-gradient(180deg, rgba(0, 200, 255, 0.9), rgba(0, 150, 200, 0.5));
    border-radius: 2px;
    flex-shrink: 0;
  }
  .subtitle-text {
    color: rgba(200, 220, 240, 0.85);
    font-size: 22px;
    font-weight: 400;
    line-height: 1.5;
  }
  /* 装飾ライン */
  .deco-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, rgba(0, 200, 255, 0.6), transparent);
  }
</style>
</head>
<body>
  <div class="bg-gradient"></div>

  <!-- カードエリア -->
  <div class="card-area">
    <div class="credit-card-back"></div>
    <div class="credit-card-front">
      <div class="card-chip"></div>
      <div class="card-number">•••• •••• •••• 1234</div>
      <div class="card-logo">
        <div class="card-logo-circle" style="background:#eb001b;"></div>
        <div class="card-logo-circle" style="background:#f79e1b; margin-left:-10px;"></div>
      </div>
    </div>
    <!-- コイン -->
    <div class="coin coin1">¥</div>
    <div class="coin coin2">¥</div>
    <div class="coin coin3">¥</div>
    <!-- スパークル -->
    <div class="sparkle sp1">✦</div>
    <div class="sparkle sp2">✦</div>
    <div class="sparkle sp3">✦</div>
  </div>

  <!-- テキストエリア -->
  <div class="text-area">
    <div class="category-badge">クレジットカード</div>
    <div class="main-title">クレカ積立<br>おすすめの<br>選び方</div>
    <div class="subtitle-wrap">
      <div class="subtitle-bar"></div>
      <div class="subtitle-text">経済圏と損益分岐点で1枚に絞る</div>
    </div>
  </div>

  <div class="deco-line"></div>
</body>
</html>
