<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
  <!-- cream rounded background -->
  <rect width="64" height="64" rx="12" fill="#f7f5ef"/>

  <!-- flask body filled green -->
  <path d="M27 9 L27 22 L7 52 Q6 58 12 58 L52 58 Q58 58 57 52 L37 22 L37 9"
        fill="#4ade80" stroke="#1d2430" stroke-width="3"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- flask mouth (top stopper line) -->
  <line x1="22" y1="9" x2="42" y2="9"
        stroke="#1d2430" stroke-width="3" stroke-linecap="round"/>

  <!-- ascending portfolio chart inside flask -->
  <polyline points="13,50 22,45 31,40 41,30"
            fill="none" stroke="#1d2430" stroke-width="3"
            stroke-linejoin="round" stroke-linecap="round"/>
  <!-- end dot -->
  <circle cx="41" cy="30" r="3.5" fill="#1d2430"/>
</svg>
