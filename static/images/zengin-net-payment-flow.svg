<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 540" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" role="img" aria-label="A銀行からB銀行への振込5ステップ">
  <rect width="820" height="540" fill="#fafafa"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2937">振込ボタンを押した瞬間、銀行の裏側で何が起きているか</text>
  <text x="410" y="58" text-anchor="middle" font-size="13" fill="#6b7280">A銀行 → 全銀システム → B銀行 → 日銀ネットの5ステップ</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
    <style>
      .box { fill:#ffffff; stroke:#0f766e; stroke-width:2; }
      .boxTitle { font-size:14px; font-weight:700; fill:#0f766e; }
      .boxBody { font-size:12px; fill:#1f2937; }
      .stepNum { font-size:14px; font-weight:700; fill:#ffffff; }
      .stepCircle { fill:#0f766e; }
      .arrLabel { font-size:11px; fill:#6b7280; }
    </style>
  </defs>

  <!-- Row 1: A銀行 (sender) -->
  <g>
    <circle cx="60" cy="120" r="16" class="stepCircle"/>
    <text x="60" y="125" text-anchor="middle" class="stepNum">1</text>
    <rect x="90" y="95" width="200" height="60" rx="6" class="box"/>
    <text x="190" y="118" text-anchor="middle" class="boxTitle">A銀行（送金元）</text>
    <text x="190" y="138" text-anchor="middle" class="boxBody">あなたの口座から1万円を引落</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="290" y1="125" x2="370" y2="125" stroke="#0f766e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="330" y="115" text-anchor="middle" class="arrLabel">為替通知</text>

  <!-- Center: 全銀システム -->
  <g>
    <circle cx="380" cy="120" r="16" class="stepCircle"/>
    <text x="380" y="125" text-anchor="middle" class="stepNum">2</text>
    <rect x="410" y="80" width="220" height="90" rx="6" fill="#ecfdf5" stroke="#0f766e" stroke-width="2"/>
    <text x="520" y="105" text-anchor="middle" class="boxTitle">全銀システム</text>
    <text x="520" y="125" text-anchor="middle" class="boxBody">「為替通知」を送受信</text>
    <text x="520" y="143" text-anchor="middle" class="boxBody">（指示書のやり取り）</text>
    <text x="520" y="161" text-anchor="middle" font-size="11" fill="#6b7280">運営：全銀ネット</text>
  </g>

  <!-- Arrow to B銀行 -->
  <line x1="630" y1="125" x2="710" y2="125" stroke="#0f766e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="670" y="115" text-anchor="middle" class="arrLabel">為替通知</text>

  <!-- Row 1: B銀行 (receiver) -->
  <g>
    <circle cx="730" cy="120" r="16" class="stepCircle"/>
    <text x="730" y="125" text-anchor="middle" class="stepNum">3</text>
    <rect x="600" y="200" width="200" height="60" rx="6" class="box"/>
    <text x="700" y="223" text-anchor="middle" class="boxTitle">B銀行（受取側）</text>
    <text x="700" y="243" text-anchor="middle" class="boxBody">受取人の口座に1万円を入金</text>
  </g>
  <line x1="700" y1="155" x2="700" y2="200" stroke="#0f766e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 description -->
  <g>
    <circle cx="60" cy="320" r="16" class="stepCircle"/>
    <text x="60" y="325" text-anchor="middle" class="stepNum">4</text>
    <text x="90" y="316" font-size="14" font-weight="700" fill="#1f2937">B銀行の勘定系が入金処理</text>
    <text x="90" y="336" font-size="12" fill="#374151">受取人のアプリ・通帳に「1万円入金」が反映される</text>
  </g>

  <!-- Bottom: Day-end netting -->
  <g>
    <rect x="40" y="380" width="740" height="140" rx="8" fill="#fff7ed" stroke="#c2410c" stroke-width="2"/>
    <circle cx="76" cy="416" r="16" fill="#c2410c"/>
    <text x="76" y="421" text-anchor="middle" class="stepNum">5</text>
    <text x="106" y="412" font-size="15" font-weight="700" fill="#9a3412">資金の清算（1日の終わりに「差額だけ」を日銀ネットで決済）</text>
    <text x="106" y="436" font-size="12" fill="#1f2937">全銀ネットがその日のすべての取引を集計し、銀行ごとの差額（ネッティング後の純額）を確定。</text>

    <!-- Mini netting illustration -->
    <rect x="60" y="450" width="180" height="55" rx="4" fill="#ffffff" stroke="#c2410c"/>
    <text x="150" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2937">A→B 合計 100億円</text>
    <text x="150" y="490" text-anchor="middle" font-size="12" fill="#1f2937">B→A 合計 95億円</text>

    <line x1="250" y1="478" x2="320" y2="478" stroke="#c2410c" stroke-width="2" marker-end="url(#arr)"/>

    <rect x="330" y="450" width="180" height="55" rx="4" fill="#ffffff" stroke="#c2410c"/>
    <text x="420" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2937">差額：A→B 5億円</text>
    <text x="420" y="490" text-anchor="middle" font-size="11" fill="#6b7280">ネッティング後の純額</text>

    <line x1="520" y1="478" x2="590" y2="478" stroke="#c2410c" stroke-width="2" marker-end="url(#arr)"/>

    <rect x="600" y="450" width="160" height="55" rx="4" fill="#ffedd5" stroke="#c2410c"/>
    <text x="680" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">日銀ネットで決済</text>
    <text x="680" y="490" text-anchor="middle" font-size="11" fill="#6b7280">日銀当座預金の振替</text>
  </g>
</svg>
