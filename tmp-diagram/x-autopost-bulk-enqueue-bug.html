<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>一括登録が発生した原因</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 560px;
    background: #ffffff;
    font-family: "Hiragino Kaku Gothic Pro", "Noto Sans JP", "Yu Gothic", sans-serif;
    padding: 36px 0 40px;
  }

  .container {
    width: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .title {
    font-size: 16px;
    font-weight: bold;
    color: #111827;
    text-align: center;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 12px;
    color: #6b7280;
    text-align: center;
    margin-bottom: 24px;
  }

  .flow {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .step {
    width: 440px;
    background: #fff1f2;
    border: 2px solid #f87171;
    border-radius: 10px;
    padding: 12px 18px;
    text-align: center;
  }

  .step .main-text {
    font-size: 13px;
    font-weight: bold;
    color: #dc2626;
  }

  .step .sub-text {
    font-size: 12px;
    color: #dc2626;
    margin-top: 4px;
    opacity: 0.85;
  }

  .step-final {
    width: 440px;
    background: #7f1d1d;
    border: 2px solid #991b1b;
    border-radius: 10px;
    padding: 14px 18px;
    text-align: center;
  }

  .step-final .main-text {
    font-size: 14px;
    font-weight: bold;
    color: #ffffff;
  }

  .step-final .sub-text {
    font-size: 12px;
    color: #fca5a5;
    margin-top: 5px;
  }

  .arrow {
    font-size: 18px;
    color: #f87171;
    line-height: 1;
    padding: 5px 0;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <div class="title">一括登録が発生した原因</div>
  <div class="subtitle">自動サイト更新の導入直後に数十件の過去記事が投稿待ちリストに入ってしまった理由</div>

  <div class="flow">

    <div class="step">
      <div class="main-text">毎時0分のcronが「全記事」をスキャン</div>
    </div>

    <div class="arrow">↓</div>

    <div class="step">
      <div class="main-text">過去に公開済みの記事もすべて</div>
      <div class="sub-text">公開日時 ≤ 現在時刻 を満たす</div>
    </div>

    <div class="arrow">↓</div>

    <div class="step">
      <div class="main-text">投稿済み履歴ファイルに登録されていない記事</div>
      <div class="sub-text">＝「未投稿」と判定</div>
    </div>

    <div class="arrow">↓</div>

    <div class="step-final">
      <div class="main-text">数十件が一括登録 ⚠️</div>
      <div class="sub-text">過去記事がすべて「新規投稿対象」として扱われた</div>
    </div>

  </div>
</div>
</body>
</html>
