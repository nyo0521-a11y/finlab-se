<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; width: 1200px; height: 630px; }
  body {
    font-family: 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif;
    width: 1200px;
    height: 630px;
    position: relative;
    background: #0f1a3d;
    display: flex;
    align-items: stretch;
  }
  /* 右半分：ベース画像 */
  .image-side {
    position: absolute;
    right: 0;
    top: 0;
    width: 600px;
    height: 630px;
    overflow: hidden;
  }
  .image-side img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: right center;
  }
  /* 左グラデーション（テキスト側） */
  .text-side {
    position: absolute;
    left: 0;
    top: 0;
    width: 680px;
    height: 630px;
    background: linear-gradient(90deg, #0f1a3d 0%, #0f1a3d 70%, transparent 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 56px 60px 56px 64px;
    z-index: 2;
  }
  .category {
    font-size: 14px;
    color: #10b981;
    font-weight: bold;
    letter-spacing: 0.12em;
    margin-bottom: 20px;
    text-transform: uppercase;
  }
  .title-main {
    font-size: 36px;
    font-weight: bold;
    color: #ffffff;
    line-height: 1.4;
    margin-bottom: 18px;
    letter-spacing: 0.02em;
  }
  .title-sub {
    font-size: 17px;
    color: #93c5fd;
    font-weight: normal;
    line-height: 1.6;
    margin-bottom: 28px;
  }
  .tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tag {
    background: rgba(59, 130, 246, 0.25);
    border: 1px solid rgba(59, 130, 246, 0.5);
    color: #93c5fd;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
  }
  .site-name {
    position: absolute;
    bottom: 28px;
    left: 64px;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
  <div class="image-side">
    <img src="http://localhost:7790/thumb-recommended-net-bank-2026-base.png" alt="">
  </div>
  <div class="text-side">
    <div class="category">🏦 ネット銀行比較 2026</div>
    <div class="title-main">投資家の銀行選び<br>ネット銀行が<br>最適解になる理由</div>
    <div class="title-sub">住信SBI・楽天・ソニー・auじぶん<br>5軸で徹底比較</div>
    <div class="tags">
      <span class="tag">証券連携</span>
      <span class="tag">目的別口座</span>
      <span class="tag">ATM手数料</span>
      <span class="tag">振込手数料</span>
    </div>
  </div>
  <div class="site-name">finlab-se.com</div>
</body>
</html>
