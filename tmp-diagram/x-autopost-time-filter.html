<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>エンキュー条件の修正前後</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      overflow: hidden;
    }

    body {
      background: #ffffff;
      font-family: "Hiragino Kaku Gothic Pro", "Noto Sans JP", "Yu Gothic", sans-serif;
      padding: 40px 36px;
      width: 900px;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      color: #111827;
      margin-bottom: 32px;
    }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    /* --- Before panel --- */
    .panel-before {
      background: #fff1f2;
      border: 2px solid #f87171;
      border-radius: 14px;
      padding: 24px 20px 20px;
    }

    /* --- After panel --- */
    .panel-after {
      background: #f0fdf4;
      border: 2px solid #4ade80;
      border-radius: 14px;
      padding: 24px 20px 20px;
    }

    .panel-header-before {
      font-size: 18px;
      font-weight: bold;
      color: #dc2626;
      margin-bottom: 14px;
    }

    .panel-header-after {
      font-size: 18px;
      font-weight: bold;
      color: #16a34a;
      margin-bottom: 14px;
    }

    /* 条件コード表示 */
    .condition-box {
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 8px 12px;
      font-family: "Courier New", "Consolas", monospace;
      font-size: 14px;
      color: #1e293b;
      margin-bottom: 14px;
      word-break: break-all;
    }

    /* 説明文 */
    .description {
      font-size: 14px;
      line-height: 1.7;
      color: #374151;
      margin-bottom: 18px;
    }

    /* --- タイムライン図 --- */
    .timeline-wrap {
      border-radius: 10px;
      padding: 16px 12px 12px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
    }

    .timeline-label {
      font-size: 12px;
      font-weight: bold;
      color: #6b7280;
      margin-bottom: 8px;
      text-align: center;
    }

    .timeline-track {
      position: relative;
      height: 54px;
    }

    /* 横軸ライン */
    .axis-line {
      position: absolute;
      top: 28px;
      left: 0;
      right: 0;
      height: 2px;
      background: #d1d5db;
      border-radius: 1px;
    }

    /* 対象範囲の背景 */
    .range-fill-before {
      position: absolute;
      top: 10px;
      left: 0;
      right: 28px;
      height: 38px;
      background: #fee2e2;
      border-radius: 6px;
      border: 1px solid #fca5a5;
    }

    .range-fill-after {
      position: absolute;
      top: 10px;
      right: 28px;
      width: 120px;
      height: 38px;
      background: #dcfce7;
      border-radius: 6px;
      border: 1px solid #86efac;
    }

    /* 対象外の背景（修正後の左側） */
    .range-grey {
      position: absolute;
      top: 10px;
      left: 0;
      right: 148px;
      height: 38px;
      background: #f3f4f6;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
    }

    /* 現在時刻マーカー（縦線） */
    .marker-now {
      position: absolute;
      top: 6px;
      right: 28px;
      width: 2px;
      height: 46px;
      background: #4b5563;
    }

    /* 2時間前マーカー（縦線） */
    .marker-2h {
      position: absolute;
      top: 6px;
      right: 148px;
      width: 2px;
      height: 46px;
      background: #16a34a;
      border-left: 2px dashed #16a34a;
    }

    /* マーカーラベル */
    .marker-label-now {
      position: absolute;
      top: 0px;
      right: 2px;
      font-size: 10px;
      color: #1f2937;
      font-weight: bold;
      white-space: nowrap;
      transform: translateX(50%);
    }

    .marker-label-2h {
      position: absolute;
      top: 0px;
      right: 122px;
      font-size: 10px;
      color: #16a34a;
      font-weight: bold;
      white-space: nowrap;
      transform: translateX(50%);
    }

    /* 過去ラベル・現在ラベル（軸端） */
    .axis-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 11px;
      color: #9ca3af;
    }

    /* 記事の点（修正前） */
    .dots-wrap {
      position: absolute;
      top: 14px;
      left: 6px;
      right: 38px;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .dot-red {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      flex-shrink: 0;
    }

    /* 修正後：2時間以内の点 */
    .dots-wrap-after {
      position: absolute;
      top: 14px;
      right: 32px;
      width: 110px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
    }

    .dot-green {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #16a34a;
      flex-shrink: 0;
    }

    /* 対象外ラベル */
    .label-out-of-range {
      position: absolute;
      top: 20px;
      left: 12px;
      font-size: 10px;
      color: #9ca3af;
      font-weight: bold;
    }

    /* 対象ラベル */
    .label-in-range-before {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: #dc2626;
      font-weight: bold;
      white-space: nowrap;
    }

    .label-in-range-after {
      position: absolute;
      bottom: -18px;
      right: 44px;
      font-size: 10px;
      color: #16a34a;
      font-weight: bold;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="title">エンキュー条件の修正前後</div>

  <div class="columns">

    <!-- ===== 修正前 ===== -->
    <div class="panel-before">
      <div class="panel-header-before">❌ 修正前</div>
      <div class="condition-box">date ≤ 現在時刻</div>
      <div class="description">
        過去に公開されたすべての記事が対象。history ファイルに記録がない記事はすべて「未投稿」として一括エンキューされてしまう。
      </div>

      <!-- タイムライン図（修正前） -->
      <div class="timeline-wrap">
        <div class="timeline-label">対象範囲</div>
        <div class="timeline-track">
          <!-- 対象範囲（赤） -->
          <div class="range-fill-before">
            <!-- 記事の点を大量に配置 -->
            <div class="dots-wrap">
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
              <div class="dot-red"></div>
            </div>
          </div>
          <!-- 横軸 -->
          <div class="axis-line"></div>
          <!-- 現在時刻マーカー -->
          <div class="marker-now">
            <span class="marker-label-now">現在時刻</span>
          </div>
          <!-- 対象ラベル -->
          <div style="position:absolute; bottom:-16px; left:50%; transform:translateX(-50%); font-size:10px; color:#dc2626; font-weight:bold; white-space:nowrap;">
            ← 過去記事37件すべてが対象 →
          </div>
        </div>
        <div class="axis-labels" style="margin-top: 22px;">
          <span>過去</span>
          <span>現在 →</span>
        </div>
      </div>
    </div>

    <!-- ===== 修正後 ===== -->
    <div class="panel-after">
      <div class="panel-header-after">✅ 修正後</div>
      <div class="condition-box">現在時刻 − 2時間 &lt; date ≤ 現在時刻</div>
      <div class="description">
        直近2時間以内に公開日時が到来した記事のみ対象。一括エンキューを防ぎつつ、GitHub Actions の遅延バッファ（最大十数分）も考慮した設定。
      </div>

      <!-- タイムライン図（修正後） -->
      <div class="timeline-wrap">
        <div class="timeline-label">対象範囲</div>
        <div class="timeline-track">
          <!-- 対象外（グレー）：左側 -->
          <div class="range-grey">
            <div class="label-out-of-range">対象外</div>
          </div>
          <!-- 対象範囲（緑）：右側2時間分 -->
          <div class="range-fill-after">
            <!-- 2時間以内の記事（少量） -->
            <div class="dots-wrap-after">
              <div class="dot-green"></div>
              <div class="dot-green"></div>
              <div class="dot-green"></div>
            </div>
          </div>
          <!-- 横軸 -->
          <div class="axis-line"></div>
          <!-- 2時間前マーカー -->
          <div class="marker-2h">
            <span class="marker-label-2h">2時間前</span>
          </div>
          <!-- 現在時刻マーカー -->
          <div class="marker-now">
            <span class="marker-label-now">現在時刻</span>
          </div>
          <!-- 対象ラベル -->
          <div style="position:absolute; bottom:-16px; right:30px; font-size:10px; color:#16a34a; font-weight:bold; white-space:nowrap;">
            直近2時間のみ
          </div>
        </div>
        <div class="axis-labels" style="margin-top: 22px;">
          <span>過去</span>
          <span>現在 →</span>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
