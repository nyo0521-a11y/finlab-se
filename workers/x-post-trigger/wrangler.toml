name = "x-post-trigger"
main = "src/index.js"
compatibility_date = "2026-04-27"

# Cloudflare Workers Scheduled: GitHub Actions workflow_dispatch を正確な時刻にトリガーする
#
# GitHub Actions の built-in cron は数時間の遅延が常態化しているため、
# 信頼性の高い Cloudflare Workers Scheduled をプライマリスケジューラとして使用する。
#
# 枠と cron（UTC）:（無料プランの上限 = 1 Worker あたり cron 5本）
#   build: 20:35 UTC = JST 05:35 → deploy.yml（5:30公開予約の反映ビルド＋Xエンキュー）
#   朝:    22:05 UTC = JST 07:05 → x-post-scheduled (morning) 新着優先・なければ既存記事紹介
#   夜:    12:05 UTC = JST 21:05 → x-post-scheduled (night)   朝の積み残し優先・なければ既存記事紹介

[triggers]
crons = [
  "35 20 * * *",
  "5 22 * * *",
  "5 12 * * *",
]
