name: X Auto Post - Rotation Reminder

# 月・水・金 21:00 JST に既存記事リマインダーを即時投稿する（承認フロー廃止版）。
#
# 条件:
#   - data/x-queue.yaml の残が >= 2 件なら skip（x-post-scheduled.yml が新記事を投稿）
#   - queue <= 1 件のときに select→generate→post を rotation_post.py が一括実行
#   - 成功時は data/x-rotation.yaml の last_promoted / promote_count を更新してコミット

on:
  schedule:
    - cron: "0 12 * * 1,3,5"   # UTC 12:00 月水金 = JST 21:00 月水金
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rotate-and-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests requests-oauthlib PyYAML ruamel.yaml

      - name: Check queue size
        id: queue_check
        shell: bash
        run: |
          set -e
          COUNT=$(python - <<'PY'
          from pathlib import Path
          from ruamel.yaml import YAML
          p = Path("data/x-queue.yaml")
          if not p.exists():
              print(0); raise SystemExit
          yaml = YAML()
          with p.open(encoding="utf-8") as f:
              data = yaml.load(f) or {}
          print(len(data.get("queue") or []))
          PY
          )
          echo "queue size: $COUNT"
          if [ "$COUNT" -ge 2 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping rotation: queue has $COUNT entries, x-post-scheduled will handle night slot"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Select, generate and post
        if: steps.queue_check.outputs.skip != 'true'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        shell: bash
        run: |
          set -e
          RESULT=$(python .github/scripts/rotation_post.py)
          echo "Result: $RESULT"

      - name: Commit rotation update
        if: steps.queue_check.outputs.skip != 'true'
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet data/x-rotation.yaml; then
            git add data/x-rotation.yaml
            git commit -m "chore(x-rotation): mark post as promoted"
            git push
          fi
