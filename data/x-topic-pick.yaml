#   - 前夜22:00 / 当日朝6:30 のスケジュールタスク（Claude Code 起動中のみ動作）が
#     経済・金融ニュースを収集→関連記事を1本選定→投稿文を生成し、ここに書き込む。
#   - 6:30 が動いた場合は前夜22:00 の内容を上書きする（最新の判断を優先）。
