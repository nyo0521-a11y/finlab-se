# X 新記事告知の待ち行列（FIFO・承認フロー廃止版）
#
# x-new-post-draft.yml（記事push時）または enqueue_post.py が追記し、
# x-post-scheduled.yml が slot条件に合えば先頭から投稿する。
# 投稿成功時に該当 entry を削除。
#
# 構造:
#   queue:
#     - post_path: content/posts/xxx.md      # 対象記事
#       added_at: 2026-04-24T14:00:00+09:00  # キュー投入時刻

queue:
  - post_path: content/posts/income-wall-framework.md
    added_at: '2026-05-09T07:58:30+09:00'
  - post_path: content/posts/furusato-tax-jumin-tax-notification.md
    added_at: '2026-05-10T06:50:24+09:00'
