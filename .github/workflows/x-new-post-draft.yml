name: X Auto Post - New Post Draft

# 新記事がmainにpushされたら、下書きIssueを作成し、
# data/x-queue.yaml に FIFO で追記する（B案：承認フロー）
#
# 流れ:
#   push to main (content/posts/**.md 追加)
#     -> 追加ファイル検出
#     -> frontmatter読み取り・投稿文生成
#     -> GitHub Issue 作成（label: x-post-pending, x-post-new）
#     -> data/x-queue.yaml に post_path と issue_number を追記してコミット
#
# 投稿タイミングは x-post-scheduled.yml が決めるため、
# 以前あった scheduled_at は参考情報扱いに変更。

on:
  push:
    branches: [main]
    paths:
      - "content/posts/**.md"
  workflow_dispatch:
    inputs:
      post_path:
        description: "手動指定: content/posts/xxx.md"
        required: false
        type: string

permissions:
  contents: write    # x-queue.yaml 更新コミットのため
  issues: write

jobs:
  create-draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 直前コミットとのdiffを取るため

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install ruamel.yaml

      - name: Detect added posts
        id: detect
        shell: bash
        run: |
          set -e
          if [ -n "${{ inputs.post_path }}" ]; then
            echo "files=${{ inputs.post_path }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # push イベントでの追加ファイル検出
          ADDED=$(git diff --name-only --diff-filter=A HEAD^ HEAD -- 'content/posts/*.md' || true)
          echo "Detected added files:"
          echo "$ADDED"
          FILES=$(echo "$ADDED" | tr '\n' ' ' | sed 's/ *$//')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Create draft issues and enqueue
        if: steps.detect.outputs.files != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for POST_PATH in ${{ steps.detect.outputs.files }}; do
            echo "=== Processing: $POST_PATH ==="
            META=$(python .github/scripts/generate_post_text.py "$POST_PATH" new)
            echo "Generated: $META"

            TEXT=$(echo "$META" | python -c "import sys,json; d=json.load(sys.stdin); print(d['text'])")
            IMAGE_URL=$(echo "$META" | python -c "import sys,json; d=json.load(sys.stdin); print(d['image_url'])")
            IMAGE_PATH=$(echo "$META" | python -c "import sys,json; d=json.load(sys.stdin); print(d['image_path'])")
            TITLE=$(echo "$META" | python -c "import sys,json; d=json.load(sys.stdin); print(d['title'])")
            LENGTH=$(echo "$META" | python -c "import sys,json; d=json.load(sys.stdin); print(d['length'])")

            # Issue本文の組立（scheduled_at は廃止、キュー順で x-post-scheduled が処理）
            BODY_FILE=$(mktemp)
            {
              echo "## 投稿予定"
              echo ""
              echo "- 投稿タイミング: キュー順（\`data/x-queue.yaml\`）で 朝7:30 または 夜21:00 枠の自動投稿"
              echo "- 文字数: $LENGTH / 140"
              echo "- 画像: $IMAGE_URL"
              echo ""
              echo "## 投稿文プレビュー"
              echo ""
              echo '```'
              echo "$TEXT"
              echo '```'
              echo ""
              echo "## 承認方法"
              echo ""
              echo "いずれかでOK:"
              echo "- このIssueに 👍 / ❤️ / 🎉 / 🚀 のいずれかのリアクションを付ける"
              echo "- \`/approve\` とコメントする"
              echo ""
              echo "編集したい場合は、このIssue本文の投稿文ブロックを書き換えてから承認してください。"
              echo ""
              echo "## キャンセル"
              echo ""
              echo "このIssueを close すれば投稿されません。キューからも自動で除外されます（投稿時にIssue状態を確認）。"
              echo ""
              echo "<!-- x-post-meta: {\"post_path\":\"$POST_PATH\",\"image_path\":\"$IMAGE_PATH\",\"image_url\":\"$IMAGE_URL\"} -->"
            } > "$BODY_FILE"

            ISSUE_URL=$(gh issue create \
              --title "[X投稿承認] $TITLE" \
              --label "x-post-pending,x-post-new" \
              --body-file "$BODY_FILE")
            ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
            echo "Created issue #$ISSUE_NUMBER: $ISSUE_URL"

            # data/x-queue.yaml に追記
            python .github/scripts/enqueue_post.py "$POST_PATH" "$ISSUE_NUMBER"
          done

          # キュー更新をまとめてコミット
          if ! git diff --quiet data/x-queue.yaml; then
            git add data/x-queue.yaml
            git commit -m "chore(x-queue): enqueue new post(s)"
            git push
          fi
