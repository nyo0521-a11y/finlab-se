<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>キュー登録条件の修正前後</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      font-family: "Hiragino Kaku Gothic Pro", "Noto Sans JP", "Yu Gothic", sans-serif;
      padding: 32px 24px 44px;
      width: 560px;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      color: #111827;
      margin-bottom: 24px;
    }

    .panel {
      border-radius: 12px;
      padding: 18px 20px 22px;
      margin-bottom: 16px;
    }
    .panel-bad  { background: #fff1f2; border: 2px solid #f87171; }
    .panel-good { background: #f0fdf4; border: 2px solid #4ade80; }

    .panel-header {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .panel-bad  .panel-header { color: #dc2626; }
    .panel-good .panel-header { color: #16a34a; }

    .condition-box {
      background: #fff;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      padding: 7px 12px;
      font-family: "Courier New", Consolas, monospace;
      font-size: 13px;
      color: #1e293b;
      margin-bottom: 10px;
    }

    .desc {
      font-size: 12px;
      color: #374151;
      line-height: 1.65;
      margin-bottom: 14px;
    }

    /* タイムライン */
    .timeline-wrap {
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px 12px 30px;
    }

    .tl-label {
      font-size: 11px;
      font-weight: bold;
      color: #6b7280;
      text-align: center;
      margin-bottom: 8px;
    }

    .tl-track {
      position: relative;
      height: 46px;
    }

    /* 軸線 */
    .axis { position: absolute; top: 23px; left: 0; right: 0; height: 2px; background: #d1d5db; }

    /* 修正前：赤い全幅バー */
    .bar-red {
      position: absolute;
      top: 8px; left: 0; right: 28px;
      height: 30px;
      background: #fee2e2;
      border: 1px solid #fca5a5;
      border-radius: 5px;
    }

    /* 修正後：グレーバー＋緑バー */
    .bar-grey {
      position: absolute;
      top: 8px; left: 0; right: 120px;
      height: 30px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 5px;
    }
    .bar-green {
      position: absolute;
      top: 8px; right: 28px;
      width: 88px;
      height: 30px;
      background: #dcfce7;
      border: 1px solid #86efac;
      border-radius: 5px;
    }

    /* ドット */
    .dots {
      position: absolute;
      top: 16px; left: 8px; right: 36px;
      display: flex; gap: 4px; flex-wrap: wrap; align-items: center;
    }
    .dot-red   { width: 7px; height: 7px; border-radius: 50%; background: #ef4444; flex-shrink: 0; }

    .dots-green {
      position: absolute;
      top: 16px; right: 32px;
      width: 80px;
      display: flex; justify-content: center; gap: 6px; align-items: center;
    }
    .dot-green { width: 8px; height: 8px; border-radius: 50%; background: #16a34a; flex-shrink: 0; }

    /* 対象外ラベル */
    .label-out {
      position: absolute;
      top: 50%; left: 10px;
      transform: translateY(-50%);
      font-size: 11px; color: #9ca3af; font-weight: bold;
    }

    /* 現在時刻マーカー */
    .marker-now {
      position: absolute;
      top: 4px; right: 28px;
      width: 2px; height: 38px;
      background: #4b5563;
    }
    .marker-now-label {
      position: absolute;
      top: -16px; right: 29px;
      transform: translateX(50%);
      font-size: 11px; color: #1f2937; font-weight: bold; white-space: nowrap;
    }

    /* 2時間前マーカー */
    .marker-2h {
      position: absolute;
      top: 4px; right: 116px;
      width: 2px; height: 38px;
      border-left: 2px dashed #16a34a;
    }
    .marker-2h-label {
      position: absolute;
      top: -16px; right: 117px;
      transform: translateX(50%);
      font-size: 11px; color: #16a34a; font-weight: bold; white-space: nowrap;
    }

    /* 範囲ラベル（バー下） */
    .range-label-red {
      position: absolute;
      bottom: -18px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px; color: #dc2626; font-weight: bold; white-space: nowrap;
    }
    .range-label-green {
      position: absolute;
      bottom: -18px; right: 24px;
      font-size: 11px; color: #16a34a; font-weight: bold; white-space: nowrap;
    }

    /* 軸端ラベル */
    .axis-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 22px;
      font-size: 11px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="title">キュー登録条件の修正前後</div>

  <!-- 修正前 -->
  <div class="panel panel-bad">
    <div class="panel-header">❌ 修正前：公開日時が現在時刻以前の全記事が対象</div>
    <div class="condition-box">date ≤ 現在時刻</div>
    <div class="desc">過去に公開されたすべての記事が対象。投稿済み履歴ファイルに記録がない記事はすべて「未投稿」として一括登録されてしまう。</div>

    <div class="timeline-wrap">
      <div class="tl-label">対象範囲</div>
      <div class="tl-track">
        <div class="bar-red">
          <div class="dots">
            <div class="dot-red"></div><div class="dot-red"></div><div class="dot-red"></div>
            <div class="dot-red"></div><div class="dot-red"></div><div class="dot-red"></div>
            <div class="dot-red"></div><div class="dot-red"></div><div class="dot-red"></div>
            <div class="dot-red"></div><div class="dot-red"></div><div class="dot-red"></div>
            <div class="dot-red"></div><div class="dot-red"></div><div class="dot-red"></div>
            <div class="dot-red"></div><div class="dot-red"></div><div class="dot-red"></div>
          </div>
        </div>
        <div class="axis"></div>
        <div class="marker-now"></div>
        <div class="marker-now-label">現在時刻</div>
        <div class="range-label-red">← 過去記事（数十件）すべてが対象 →</div>
      </div>
      <div class="axis-labels"><span>過去</span><span>現在 →</span></div>
    </div>
  </div>

  <!-- 修正後 -->
  <div class="panel panel-good">
    <div class="panel-header">✅ 修正後：直近2時間以内に公開された記事のみ対象</div>
    <div class="condition-box">現在時刻 − 2時間 &lt; date ≤ 現在時刻</div>
    <div class="desc">直近2時間以内に公開日時が到来した記事のみ対象。一括登録を防ぎつつ、遅延バッファも考慮した設定。</div>

    <div class="timeline-wrap">
      <div class="tl-label">対象範囲</div>
      <div class="tl-track">
        <div class="bar-grey"><div class="label-out">対象外</div></div>
        <div class="bar-green">
          <div class="dots-green">
            <div class="dot-green"></div>
            <div class="dot-green"></div>
            <div class="dot-green"></div>
          </div>
        </div>
        <div class="axis"></div>
        <div class="marker-2h"></div>
        <div class="marker-2h-label">2時間前</div>
        <div class="marker-now"></div>
        <div class="marker-now-label">現在時刻</div>
        <div class="range-label-green">直近2時間のみ</div>
      </div>
      <div class="axis-labels"><span>過去</span><span>現在 →</span></div>
    </div>
  </div>

</body>
</html>
