name: X Rotation Preview (temp)

# 次のリマインダー候補3本の投稿文を実際のロジックで生成して表示するだけ（Issue作成なし・投稿なし）
# 確認後この workflow ファイルは削除する

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install PyYAML
      - name: Generate previews for top 3
        shell: bash
        run: |
          set -e
          for POST in dividend-life-calculation dividend-target-simulator-tool-usage montecarlo-tool-usage; do
            echo ""
            echo "========== $POST =========="
            python .github/scripts/generate_post_text.py "content/posts/$POST.md" rotation \
              | python -c "import sys,json; d=json.load(sys.stdin); print('length:', d['length']); print('image:', d['image_url']); print('---text---'); print(d['text'])"
          done
