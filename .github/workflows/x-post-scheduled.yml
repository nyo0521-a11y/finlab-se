name: X Auto Post - Scheduled Post

# data/x-queue.yaml の先頭エントリを 1 日 2 枠で順次投稿する（承認フロー廃止版）。
#
# ★ 1タイミング1件ルール ★
#   各スロットで投稿されるのは常に1件のみ。
#   夜枠は x-rotation.yml (21:05) と役割を分担し、同時投稿しない設計。
#
# 枠と cron（オフピーク時刻 + バックアップ枠で信頼性を確保）:
#   朝: UTC 22:17 = JST 07:17（主）/ UTC 22:37 = JST 07:37（補）
#   夜: UTC 11:53 = JST 20:53（主）/ UTC 12:13 = JST 21:13（補）
#
# ※ GitHub Actions の :00/:30 は最混雑帯で遅延・スキップが頻発するため
#   :17/:37/:53/:13 に変更。主が失敗しても補が救済する。
# ※ 重複投稿は dequeue_and_post.py が data/x-post-state.yaml で防止する。
# ※ dequeue_and_post.py がslot・queue残で判定するため workflow 側は slot を渡すだけ。

on:
  # ★ スケジュールは Cloudflare Workers (workers/x-post-trigger) が担当 ★
  #   CF Workers → workflow_dispatch でこのワークフローをトリガーする設計。
  #   GitHub Actions の built-in schedule cron は遅延が数時間に及ぶため廃止。
  workflow_dispatch:
    inputs:
      slot:
        description: "morning / night / manual"
        required: false
        default: "manual"
        type: string

# ★ 並列実行防止 ★
# 主枠（7:17/20:53）が実行中にバックアップ枠（7:37/21:13）が来ても待機させる。
# cancel-in-progress: false = キャンセルせず待機 → 主枠完了後に補枠が起動 →
# その時点で morning_rotation_last_posted が当日日付になっているため補枠はスキップする。
concurrency:
  group: x-post-scheduled
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests requests-oauthlib ruamel.yaml PyYAML

      - name: Determine slot
        id: slot
        shell: bash
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SLOT="${{ inputs.slot }}"
            [ -z "$SLOT" ] && SLOT="manual"
          else
            # スケジュール名でスロット判定（朝主・朝補 → morning、夜主・夜補 → night）
            case "${{ github.event.schedule }}" in
              "17 22 * * *"|"37 22 * * *") SLOT="morning" ;;
              "53 11 * * *"|"13 12 * * *") SLOT="night" ;;
              *) SLOT="morning" ;;  # fallback
            esac
          fi
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"
          echo "Selected slot: $SLOT (JST $(TZ=Asia/Tokyo date +'%H:%M'))"

      - name: Dequeue and post
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        shell: bash
        run: |
          # set -e を使わず exit code を別変数で捕捉する（set -e + RESULT=$(...) だとエラー時に
          # echo が実行される前にシェルが死んでエラー内容が見えなくなるため）
          set +e
          RESULT=$(python .github/scripts/dequeue_and_post.py "${{ steps.slot.outputs.slot }}")
          EXIT_CODE=$?
          set -e
          echo "Result: $RESULT"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::dequeue_and_post.py failed (exit $EXIT_CODE). See 'Result' above for details."
            exit $EXIT_CODE
          fi
          STATUS=$(echo "$RESULT" | python -c "import sys,json; print(json.load(sys.stdin).get('status',''))")
          echo "status=$STATUS" >> "$GITHUB_ENV"

      - name: Commit queue update
        if: env.status == 'posted'
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/x-queue.yaml
          # x-post-state.yaml が存在すれば一緒にコミット（重複投稿防止フラグ）
          [ -f data/x-post-state.yaml ] && git add data/x-post-state.yaml
          # 投稿履歴が更新されていればコミット対象に追加
          [ -f data/x-post-history.yaml ] && git add data/x-post-history.yaml
          if ! git diff --cached --quiet; then
            git commit -m "chore(x-queue): dequeue after post"
            # 手動コミットとの競合を回避するため rebase してから push
            git pull --rebase origin main
            git push
          fi

      # =========================================
      # 朝スロット フォールバック：新規記事がなければリマインダーを投稿
      # 夜の x-rotation.yml（21:05）と同じ仕組みを朝にも適用する。
      # バックアップ枠（7:37）での2重投稿は morning_rotation_last_posted で防止する。
      # =========================================
      - name: Morning rotation fallback
        if: steps.slot.outputs.slot == 'morning' && env.status != 'posted' && env.status != 'already_posted'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        shell: bash
        run: |
          set -e
          TODAY=$(TZ=Asia/Tokyo date +'%Y-%m-%d')

          # すでに今朝メイン投稿済み（新着投稿）なら skip
          # キューが空で status="empty" になった場合でも、当日すでに新着投稿があれば
          # ローテーションを実行しない（1時間帯に1投稿のみ）
          MAIN_LAST=$(python - <<'PYEOF0'
          from pathlib import Path
          from ruamel.yaml import YAML
          p = Path("data/x-post-state.yaml")
          if not p.exists():
              print("")
          else:
              yaml = YAML()
              with p.open(encoding="utf-8") as f:
                  d = yaml.load(f) or {}
              print(d.get("morning_last_posted", "") or "")
          PYEOF0
          )
          if [ "$MAIN_LAST" = "$TODAY" ]; then
            echo "morning main post already ran today ($TODAY), skipping rotation fallback"
            exit 0
          fi

          # すでに今朝ローテーション済みなら skip（バックアップ枠 7:37 の2重実行防止）
          LAST=$(python - <<'PYEOF1'
          from pathlib import Path
          from ruamel.yaml import YAML
          p = Path("data/x-post-state.yaml")
          if not p.exists():
              print("")
          else:
              yaml = YAML()
              with p.open(encoding="utf-8") as f:
                  d = yaml.load(f) or {}
              print(d.get("morning_rotation_last_posted", "") or "")
          PYEOF1
          )
          if [ "$LAST" = "$TODAY" ]; then
            echo "morning rotation already ran today ($TODAY), skipping"
            exit 0
          fi

          set +e
          RESULT=$(python .github/scripts/rotation_post.py)
          EXIT_CODE=$?
          set -e
          echo "Rotation result: $RESULT"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::rotation_post.py failed (exit $EXIT_CODE)"
            exit $EXIT_CODE
          fi

          # morning_rotation_last_posted を更新して2重投稿フラグを立てる
          python - <<'PYEOF2'
          from pathlib import Path
          from ruamel.yaml import YAML
          from datetime import datetime, timezone, timedelta
          JST = timezone(timedelta(hours=9))
          today = datetime.now(JST).date().isoformat()
          p = Path("data/x-post-state.yaml")
          yaml = YAML()
          yaml.indent(mapping=2, sequence=4, offset=2)
          data = {}
          if p.exists():
              with p.open(encoding="utf-8") as f:
                  data = yaml.load(f) or {}
          data["morning_rotation_last_posted"] = today
          with p.open("w", encoding="utf-8") as f:
              yaml.dump(data, f)
          PYEOF2
          echo "rotation_ran=true" >> "$GITHUB_ENV"

      - name: Commit rotation update (morning fallback)
        if: env.rotation_ran == 'true'
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/x-rotation.yaml
          [ -f data/x-post-state.yaml ] && git add data/x-post-state.yaml
          [ -f data/x-post-history.yaml ] && git add data/x-post-history.yaml
          if ! git diff --cached --quiet; then
            git commit -m "chore(x-rotation): morning fallback rotation posted"
            # 手動コミットとの競合を回避するため rebase してから push
            git pull --rebase origin main
            git push
          fi
