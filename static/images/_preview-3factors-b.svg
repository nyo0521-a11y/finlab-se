<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif">
  <rect width="800" height="560" fill="#fafafa"/>
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2937">【パターンB】真のベン図：重なり領域に企業を配置</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#6b7280">複数の特徴を持つ企業ほど中央寄りに位置し、長期増配の安定度が高い</text>

  <!-- Three overlapping circles -->
  <g opacity="0.45">
    <circle cx="320" cy="240" r="160" fill="#60a5fa"/>
    <circle cx="480" cy="240" r="160" fill="#34d399"/>
    <circle cx="400" cy="370" r="160" fill="#fbbf24"/>
  </g>

  <!-- Circle outlines for clarity -->
  <g fill="none" stroke-width="2.5">
    <circle cx="320" cy="240" r="160" stroke="#2563eb"/>
    <circle cx="480" cy="240" r="160" stroke="#059669"/>
    <circle cx="400" cy="370" r="160" stroke="#d97706"/>
  </g>

  <!-- Circle labels -->
  <g font-weight="700" font-size="17" text-anchor="middle">
    <text x="200" y="135" fill="#1d4ed8">景気耐性</text>
    <text x="600" y="135" fill="#047857">参入障壁</text>
    <text x="400" y="540" fill="#92400e">株主還元方針</text>
  </g>

  <!-- Region examples -->
  <!-- Only 景気耐性 (left only) -->
  <g font-size="11" fill="#1f2937" text-anchor="middle">
    <text x="200" y="240">花王</text>
    <text x="200" y="258">沖縄セルラー</text>
  </g>
  <!-- Only 参入障壁 (right only) -->
  <g font-size="11" fill="#1f2937" text-anchor="middle">
    <text x="600" y="240">SPK</text>
    <text x="600" y="258">USS</text>
  </g>
  <!-- Only 株主還元方針 (bottom only) -->
  <g font-size="11" fill="#1f2937" text-anchor="middle">
    <text x="400" y="475">三菱商事</text>
    <text x="400" y="493">伊藤忠商事</text>
  </g>
  <!-- 景気耐性 ∩ 参入障壁 (top-center) -->
  <g font-size="11" fill="#1f2937" text-anchor="middle">
    <text x="400" y="200">ニトリ</text>
    <text x="400" y="218">リンナイ</text>
  </g>
  <!-- 景気耐性 ∩ 株主還元 (bottom-left of overlap) -->
  <g font-size="11" fill="#1f2937" text-anchor="middle">
    <text x="305" y="365">KDDI</text>
  </g>
  <!-- 参入障壁 ∩ 株主還元 (bottom-right) -->
  <g font-size="11" fill="#1f2937" text-anchor="middle">
    <text x="495" y="365">リコーリース</text>
  </g>
  <!-- All three (center) -->
  <g text-anchor="middle">
    <rect x="350" y="290" width="100" height="40" rx="6" fill="#ffffff" stroke="#1f2937" stroke-width="1.2"/>
    <text x="400" y="306" font-size="11" font-weight="700" fill="#1f2937">3要素を満たす</text>
    <text x="400" y="322" font-size="11" font-weight="700" fill="#1f2937">三菱HCキャピタル</text>
  </g>
</svg>
