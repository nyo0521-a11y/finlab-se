name: X Auto Post - Scheduled Post

# 1 日 2 枠の X 投稿（2026-06-14 改定：朝＝おすすめ／夜＝新着）。
#
# ★ 朝 (JST 07:05) ＝ 既存記事のおすすめ専用（新着は出さない） ★
#   morning_post.py が「話題連動pick（data/x-topic-pick.yaml）があればそれ →
#   なければ通常rotation（直近3日除外）」を処理する。話題連動pickは前夜22:00／当日6:30の
#   スケジュールタスク（Claude Code 起動中のみ）が準備する。準備が無い朝は通常rotation。
#
# ★ 夜 (JST 21:05) ＝ 新着優先 ★
#   新着キューがあれば新着投稿、なければ既存記事の紹介（rotation フォールバック）。
#   朝で出さなかった当日公開の新着は、ここで告知される。
#
# ※ 起動は Cloudflare Workers (workers/x-post-trigger) の workflow_dispatch。
# ※ 重複投稿は data/x-post-state.yaml の {slot}_last_posted で防止する。

on:
  # ★ スケジュールは Cloudflare Workers (workers/x-post-trigger) が担当 ★
  #   CF Workers → workflow_dispatch でこのワークフローをトリガーする設計。
  #   GitHub Actions の built-in schedule cron は遅延が数時間に及ぶため廃止。
  workflow_dispatch:
    inputs:
      slot:
        description: "morning / night / manual"
        required: false
        default: "manual"
        type: string

# ★ 並列実行防止 ★
# 手動起動が重なった場合などに直列化する（cancel-in-progress: false = 待機）。
concurrency:
  group: x-post-scheduled
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests requests-oauthlib ruamel.yaml PyYAML anthropic

      - name: Determine slot
        id: slot
        shell: bash
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SLOT="${{ inputs.slot }}"
            [ -z "$SLOT" ] && SLOT="manual"
          else
            # スケジュール名でスロット判定（朝主・朝補 → morning、夜主・夜補 → night）
            case "${{ github.event.schedule }}" in
              "5 22 * * *") SLOT="morning" ;;
              "5 12 * * *") SLOT="night" ;;
              *) SLOT="morning" ;;  # fallback
            esac
          fi
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"
          echo "Selected slot: $SLOT (JST $(TZ=Asia/Tokyo date +'%H:%M'))"

      # =========================================
      # 朝スロット（JST 07:05）：既存記事のおすすめ専用。新着は扱わない。
      # morning_post.py が「話題連動pick優先 → なければ通常rotation（直近3日除外）」を処理。
      # =========================================
      - name: Morning post (recommendation only)
        if: steps.slot.outputs.slot == 'morning'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ROTATION_EXCLUDE_DAYS: "7"
        shell: bash
        run: |
          set +e
          RESULT=$(python .github/scripts/morning_post.py)
          EXIT_CODE=$?
          set -e
          echo "Morning result: $RESULT"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::morning_post.py failed (exit $EXIT_CODE)"
            exit $EXIT_CODE
          fi

      - name: Commit morning changes
        if: steps.slot.outputs.slot == 'morning'
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          [ -f data/x-rotation.yaml ] && git add data/x-rotation.yaml
          [ -f data/x-post-state.yaml ] && git add data/x-post-state.yaml
          [ -f data/x-post-history.yaml ] && git add data/x-post-history.yaml
          if ! git diff --cached --quiet; then
            git commit -m "chore(x): morning post"
            git pull --rebase origin main
            git push
          fi

      - name: Dequeue and post (night / manual new article)
        if: steps.slot.outputs.slot != 'morning'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        shell: bash
        run: |
          # set -e を使わず exit code を別変数で捕捉する（set -e + RESULT=$(...) だとエラー時に
          # echo が実行される前にシェルが死んでエラー内容が見えなくなるため）
          set +e
          RESULT=$(python .github/scripts/dequeue_and_post.py "${{ steps.slot.outputs.slot }}")
          EXIT_CODE=$?
          set -e
          echo "Result: $RESULT"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::dequeue_and_post.py failed (exit $EXIT_CODE). See 'Result' above for details."
            exit $EXIT_CODE
          fi
          STATUS=$(echo "$RESULT" | python -c "import sys,json; print(json.load(sys.stdin).get('status',''))")
          echo "status=$STATUS" >> "$GITHUB_ENV"

      - name: Commit queue update
        if: env.status == 'posted'
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/x-queue.yaml
          # x-post-state.yaml が存在すれば一緒にコミット（重複投稿防止フラグ）
          [ -f data/x-post-state.yaml ] && git add data/x-post-state.yaml
          # 投稿履歴が更新されていればコミット対象に追加
          [ -f data/x-post-history.yaml ] && git add data/x-post-history.yaml
          # 新着投稿時に rotation台帳へ登録されるため一緒にコミット（全記事自動同期台帳化）
          [ -f data/x-rotation.yaml ] && git add data/x-rotation.yaml
          if ! git diff --cached --quiet; then
            git commit -m "chore(x-queue): dequeue after post"
            # 手動コミットとの競合を回避するため rebase してから push
            git pull --rebase origin main
            git push
          fi

      # =========================================
      # 夜のフォールバック：新規記事がなければ既存記事の紹介を投稿
      # 2重実行は night_rotation_last_posted で防止する。（朝は morning_post.py が内部で処理）
      # =========================================
      - name: Rotation fallback
        if: steps.slot.outputs.slot == 'night' && env.status != 'posted' && env.status != 'already_posted'
        env:
          SLOT: ${{ steps.slot.outputs.slot }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        shell: bash
        run: |
          set -e
          TODAY=$(TZ=Asia/Tokyo date +'%Y-%m-%d')

          # この枠で当日すでに新着投稿済みなら skip（1時間帯に1投稿のみ）
          MAIN_LAST=$(python - <<'PYEOF0'
          import os
          from pathlib import Path
          from ruamel.yaml import YAML
          p = Path("data/x-post-state.yaml")
          if not p.exists():
              print("")
          else:
              yaml = YAML()
              with p.open(encoding="utf-8") as f:
                  d = yaml.load(f) or {}
              print(d.get(f"{os.environ['SLOT']}_last_posted", "") or "")
          PYEOF0
          )
          if [ "$MAIN_LAST" = "$TODAY" ]; then
            echo "$SLOT main post already ran today ($TODAY), skipping rotation fallback"
            exit 0
          fi

          # この枠で当日すでにローテーション済みなら skip（2重実行防止）
          LAST=$(python - <<'PYEOF1'
          import os
          from pathlib import Path
          from ruamel.yaml import YAML
          p = Path("data/x-post-state.yaml")
          if not p.exists():
              print("")
          else:
              yaml = YAML()
              with p.open(encoding="utf-8") as f:
                  d = yaml.load(f) or {}
              print(d.get(f"{os.environ['SLOT']}_rotation_last_posted", "") or "")
          PYEOF1
          )
          if [ "$LAST" = "$TODAY" ]; then
            echo "$SLOT rotation already ran today ($TODAY), skipping"
            exit 0
          fi

          set +e
          RESULT=$(python .github/scripts/rotation_post.py)
          EXIT_CODE=$?
          set -e
          echo "Rotation result: $RESULT"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::rotation_post.py failed (exit $EXIT_CODE)"
            exit $EXIT_CODE
          fi

          # {slot}_rotation_last_posted を更新して2重投稿フラグを立てる
          python - <<'PYEOF2'
          import os
          from pathlib import Path
          from ruamel.yaml import YAML
          from datetime import datetime, timezone, timedelta
          JST = timezone(timedelta(hours=9))
          today = datetime.now(JST).date().isoformat()
          p = Path("data/x-post-state.yaml")
          yaml = YAML()
          yaml.indent(mapping=2, sequence=4, offset=2)
          data = {}
          if p.exists():
              with p.open(encoding="utf-8") as f:
                  data = yaml.load(f) or {}
          data[f"{os.environ['SLOT']}_rotation_last_posted"] = today
          with p.open("w", encoding="utf-8") as f:
              yaml.dump(data, f)
          PYEOF2
          echo "rotation_ran=true" >> "$GITHUB_ENV"

      - name: Commit rotation update (fallback)
        if: env.rotation_ran == 'true'
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/x-rotation.yaml
          [ -f data/x-post-state.yaml ] && git add data/x-post-state.yaml
          [ -f data/x-post-history.yaml ] && git add data/x-post-history.yaml
          if ! git diff --cached --quiet; then
            git commit -m "chore(x-rotation): fallback rotation posted"
            # 手動コミットとの競合を回避するため rebase してから push
            git pull --rebase origin main
            git push
          fi
