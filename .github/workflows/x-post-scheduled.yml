name: X Auto Post - Scheduled Post

# data/x-queue.yaml の先頭エントリを 1 日 2 枠で順次投稿する（承認フロー廃止版）。
#
# 枠:
#   - 朝 JST 07:30 (cron "30 22 * * *") : queue>=1 で投稿
#   - 夜 JST 21:00 (cron "0 12 * * *")  :
#       月水金 : queue>=2 のみ投稿（1件以下なら x-rotation.yml がリマインダーを投稿）
#       火木土日: queue>=1 で投稿
#
# dequeue_and_post.py がslot・曜日・queue残で判定するため workflow 側は slot を渡すだけ。

on:
  schedule:
    - cron: "30 22 * * *"   # UTC 22:30 = JST 07:30（朝）
    - cron: "0 12 * * *"    # UTC 12:00 = JST 21:00（夜）
  workflow_dispatch:
    inputs:
      slot:
        description: "morning / night / manual"
        required: false
        default: "manual"
        type: string

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests requests-oauthlib ruamel.yaml

      - name: Determine slot
        id: slot
        shell: bash
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SLOT="${{ inputs.slot }}"
            [ -z "$SLOT" ] && SLOT="manual"
          elif [ "${{ github.event.schedule }}" = "0 12 * * *" ]; then
            SLOT="night"
          else
            SLOT="morning"
          fi
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"
          echo "Selected slot: $SLOT"

      - name: Dequeue and post
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        shell: bash
        run: |
          set -e
          RESULT=$(python .github/scripts/dequeue_and_post.py "${{ steps.slot.outputs.slot }}")
          echo "Result: $RESULT"
          STATUS=$(echo "$RESULT" | python -c "import sys,json; print(json.load(sys.stdin).get('status',''))")
          echo "status=$STATUS" >> "$GITHUB_ENV"

      - name: Commit queue update
        if: env.status == 'posted'
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet data/x-queue.yaml; then
            git add data/x-queue.yaml
            git commit -m "chore(x-queue): dequeue after post"
            git push
          fi
