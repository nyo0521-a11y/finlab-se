<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 100vw;
    height: 100vh;
    background: #040d1a;
    font-family: "Hiragino Kaku Gothic Pro", "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif;
    display: flex;
    align-items: stretch;
    overflow: hidden;
  }

  /* 左エリア */
  .left {
    width: 52%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 52px 0 52px 64px;
    position: relative;
    z-index: 2;
  }

  /* 左側に右から暗くなるグラデーション（イラストとの境界をなじませる） */
  .left::after {
    content: '';
    position: absolute;
    right: -60px;
    top: 0;
    width: 80px;
    height: 100%;
    background: linear-gradient(to right, #040d1a, transparent);
    z-index: 3;
  }

  /* カテゴリバッジ */
  .badge {
    display: inline-block;
    border: 1.5px solid #00e5cc;
    color: #00e5cc;
    font-size: 15px;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 4px;
    letter-spacing: 1px;
    margin-bottom: 24px;
    width: fit-content;
  }

  /* メインタイトル */
  .title {
    font-size: 52px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1.3;
    letter-spacing: -0.5px;
    margin-bottom: 22px;
    text-shadow: 0 2px 20px rgba(0, 0, 0, 0.8);
  }

  /* サブタイトル（左ボーダー付き） */
  .subtitle {
    font-size: 19px;
    font-weight: 500;
    color: #a0b8c8;
    border-left: 3px solid #00e5cc;
    padding-left: 14px;
    line-height: 1.5;
  }

  /* 右エリア（イラスト） */
  .right {
    width: 48%;
    position: relative;
    overflow: hidden;
  }

  .right img {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 115%;
    height: 115%;
    object-fit: cover;
    object-position: center;
  }

  /* 左端のフェード（イラストと背景のなじみ） */
  .right::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    width: 120px;
    height: 100%;
    background: linear-gradient(to right, #040d1a, transparent);
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="left">
    <span class="badge">資産形成</span>
    <div class="title">iDeCo 2026年改正<br>自分はどうなる？</div>
    <div class="subtitle">企業年金あり・なし別の<br>掛金上限と節税シミュレーション</div>
  </div>
  <div class="right">
    <img src="http://localhost:18766/static/images/base-ideco-2026-reform.png" alt="">
  </div>
</body>
</html>
