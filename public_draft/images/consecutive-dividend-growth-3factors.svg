<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif">
  <rect width="800" height="460" fill="#fafafa"/>
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2937">連続増配を続けられる企業の3つの特徴</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#6b7280">いずれか（または複数）を持つ企業ほど、長期で増配を続けやすい</text>

  <!-- Row 1: 景気耐性 -->
  <g>
    <rect x="40" y="90" width="720" height="100" rx="10" fill="#ffffff" stroke="#60a5fa" stroke-width="2"/>
    <rect x="40" y="90" width="180" height="100" rx="10" fill="#60a5fa"/>
    <text x="130" y="135" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">景気耐性</text>
    <text x="130" y="158" text-anchor="middle" font-size="11" fill="#dbeafe">Defensive Demand</text>
    <text x="240" y="120" font-size="13" fill="#374151">需要が安定しており、景気が悪化しても売上が大きく落ちない業種。</text>
    <text x="240" y="138" font-size="13" fill="#374151">日用品・通信・インフラなどが代表例。</text>
    <text x="240" y="168" font-size="12" font-weight="700" fill="#1e3a8a">該当例：</text>
    <text x="312" y="168" font-size="12" fill="#1f2937">花王／KDDI／沖縄セルラー電話／リンナイ</text>
  </g>

  <!-- Row 2: 参入障壁 -->
  <g>
    <rect x="40" y="200" width="720" height="100" rx="10" fill="#ffffff" stroke="#34d399" stroke-width="2"/>
    <rect x="40" y="200" width="180" height="100" rx="10" fill="#34d399"/>
    <text x="130" y="245" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">参入障壁</text>
    <text x="130" y="268" text-anchor="middle" font-size="11" fill="#d1fae5">Moat / Niche</text>
    <text x="240" y="230" font-size="13" fill="#374151">ニッチトップやプラットフォーム構造で、他社が入り込みにくい</text>
    <text x="240" y="248" font-size="13" fill="#374151">独自のポジションを持っている。</text>
    <text x="240" y="278" font-size="12" font-weight="700" fill="#065f46">該当例：</text>
    <text x="312" y="278" font-size="12" fill="#1f2937">ユー・エス・エス／SPK／リコーリース／ニトリホールディングス</text>
  </g>

  <!-- Row 3: 株主還元方針 -->
  <g>
    <rect x="40" y="310" width="720" height="100" rx="10" fill="#ffffff" stroke="#fbbf24" stroke-width="2"/>
    <rect x="40" y="310" width="180" height="100" rx="10" fill="#fbbf24"/>
    <text x="130" y="355" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">株主還元方針</text>
    <text x="130" y="378" text-anchor="middle" font-size="11" fill="#fef3c7">Capital Return</text>
    <text x="240" y="340" font-size="13" fill="#374151">累進配当・配当性向／DOEの数値コミットなど、減配しにくい仕組み</text>
    <text x="240" y="358" font-size="13" fill="#374151">を経営方針として明示している。</text>
    <text x="240" y="388" font-size="12" font-weight="700" fill="#92400e">該当例：</text>
    <text x="312" y="388" font-size="12" fill="#1f2937">三菱HCキャピタル／リコーリース／KDDI／三菱商事 など</text>
  </g>

  <text x="400" y="442" text-anchor="middle" font-size="11" fill="#9ca3af">※同じ企業が複数の特徴を持つこともあります（例：KDDI＝景気耐性＋株主還元方針）</text>
</svg>
