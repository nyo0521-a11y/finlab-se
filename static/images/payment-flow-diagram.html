<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Meiryo", "Yu Gothic", "MS Gothic", sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .wrapper {
    padding: 32px 40px 28px;
    background: #fff;
  }
  h2 {
    text-align: center;
    font-size: 18px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 28px;
    letter-spacing: 0.02em;
  }
  .flow {
    display: flex;
    align-items: center;
    gap: 0;
    position: relative;
  }
  .box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 110px;
    flex-shrink: 0;
  }
  .icon-wrap {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.10);
  }
  .label {
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    color: #333;
    line-height: 1.4;
    white-space: pre-line;
  }
  .arrow-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    width: 60px;
    flex-shrink: 0;
  }
  .arrow-row {
    display: flex;
    align-items: center;
    width: 100%;
    gap: 2px;
  }
  .step-badge {
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .badge-blue { background: #4a90d9; }
  .badge-green { background: #52b788; }
  .arrow-line {
    flex: 1;
    height: 2.5px;
    border-radius: 2px;
  }
  .line-blue { background: #4a90d9; }
  .line-green { background: #52b788; }
  .arrowhead {
    width: 0;
    height: 0;
    flex-shrink: 0;
  }
  .arrow-right {
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-left: 9px solid #4a90d9;
  }
  .arrow-left {
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-right: 9px solid #52b788;
  }
  /* colors */
  .c1 { background: #dbeafe; }
  .c2 { background: #dcfce7; }
  .c3 { background: #fed7aa; }
  .c4 { background: #e9d5ff; }
  .c5 { background: #fef9c3; }
  .c6 { background: #fce7f3; }
  .caption {
    margin-top: 20px;
    text-align: center;
    font-size: 12px;
    color: #555;
  }
  .caption span { margin: 0 6px; }
  .cap-blue { color: #4a90d9; font-weight: 700; }
  .cap-green { color: #52b788; font-weight: 700; }
</style>
</head>
<body>
<div class="wrapper">
  <h2>承認が返ってくるまでの流れ（0.1〜0.5秒）</h2>
  <div class="flow">
    <!-- Box 1 -->
    <div class="box">
      <div class="icon-wrap c1">👤</div>
      <div class="label">カード会員</div>
    </div>

    <!-- Arrow 1 -->
    <div class="arrow-wrap">
      <div class="arrow-row">
        <div class="step-badge badge-blue">①</div>
        <div class="arrow-line line-blue"></div>
        <div class="arrowhead arrow-right"></div>
      </div>
      <div class="arrow-row" style="flex-direction:row-reverse;">
        <div class="step-badge badge-green">⑤</div>
        <div class="arrow-line line-green"></div>
        <div class="arrowhead arrow-left"></div>
      </div>
    </div>

    <!-- Box 2 -->
    <div class="box">
      <div class="icon-wrap c2">🏪</div>
      <div class="label">加盟店<br>（EC事業者）</div>
    </div>

    <!-- Arrow 2 -->
    <div class="arrow-wrap">
      <div class="arrow-row">
        <div class="step-badge badge-blue">②</div>
        <div class="arrow-line line-blue"></div>
        <div class="arrowhead arrow-right"></div>
      </div>
      <div class="arrow-row" style="flex-direction:row-reverse;">
        <div class="step-badge badge-green" style="opacity:0">⑤</div>
        <div class="arrow-line line-green"></div>
        <div class="arrowhead arrow-left"></div>
      </div>
    </div>

    <!-- Box 3 -->
    <div class="box">
      <div class="icon-wrap c3">💳</div>
      <div class="label">PSP<br>（決済代行）</div>
    </div>

    <!-- Arrow 3 -->
    <div class="arrow-wrap">
      <div class="arrow-row">
        <div class="step-badge badge-blue">③</div>
        <div class="arrow-line line-blue"></div>
        <div class="arrowhead arrow-right"></div>
      </div>
      <div class="arrow-row" style="flex-direction:row-reverse;">
        <div class="step-badge badge-green" style="opacity:0">⑤</div>
        <div class="arrow-line line-green"></div>
        <div class="arrowhead arrow-left"></div>
      </div>
    </div>

    <!-- Box 4 -->
    <div class="box">
      <div class="icon-wrap c4">🏦</div>
      <div class="label">アクワイアラ</div>
    </div>

    <!-- Arrow 4 -->
    <div class="arrow-wrap">
      <div class="arrow-row">
        <div class="step-badge badge-blue">④</div>
        <div class="arrow-line line-blue"></div>
        <div class="arrowhead arrow-right"></div>
      </div>
      <div class="arrow-row" style="flex-direction:row-reverse;">
        <div class="step-badge badge-green" style="opacity:0">⑤</div>
        <div class="arrow-line line-green"></div>
        <div class="arrowhead arrow-left"></div>
      </div>
    </div>

    <!-- Box 5 -->
    <div class="box">
      <div class="icon-wrap c5">🌐</div>
      <div class="label">国際ブランド<br>（Visa等）</div>
    </div>

    <!-- Arrow 5 -->
    <div class="arrow-wrap">
      <div class="arrow-row">
        <div class="step-badge badge-blue" style="opacity:0">④</div>
        <div class="arrow-line line-blue"></div>
        <div class="arrowhead arrow-right"></div>
      </div>
      <div class="arrow-row" style="flex-direction:row-reverse;">
        <div class="step-badge badge-green" style="opacity:0">⑤</div>
        <div class="arrow-line line-green"></div>
        <div class="arrowhead arrow-left"></div>
      </div>
    </div>

    <!-- Box 6 -->
    <div class="box">
      <div class="icon-wrap c6">🏢</div>
      <div class="label">イシュア<br>（発行会社）</div>
    </div>
  </div>

  <div class="caption">
    <span class="cap-blue">①〜④ オーソリゼーション（承認要求）</span>
    <span>→</span>
    <span class="cap-green">⑤ 承認 / 否認の返答</span>
  </div>
</div>
</body>
</html>
