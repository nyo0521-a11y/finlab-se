<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif">
  <rect width="800" height="460" fill="#fafafa"/>
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2937">【パターンA】3列並列：3つの特徴を独立して提示</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#6b7280">いずれか（または複数）を持つ企業ほど、長期で増配を続けやすい</text>

  <!-- Column 1 -->
  <g>
    <rect x="36" y="90" width="232" height="330" rx="10" fill="#ffffff" stroke="#60a5fa" stroke-width="2"/>
    <rect x="36" y="90" width="232" height="40" rx="10" fill="#60a5fa"/>
    <text x="152" y="116" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">景気耐性</text>
    <text x="152" y="152" text-anchor="middle" font-size="11" fill="#6b7280">Defensive Demand</text>
    <text x="52" y="180" font-size="12" fill="#374151">需要が安定しており、</text>
    <text x="52" y="198" font-size="12" fill="#374151">景気が悪化しても売上が</text>
    <text x="52" y="216" font-size="12" fill="#374151">大きく落ちない業種。</text>
    <text x="52" y="244" font-size="12" fill="#374151">日用品・通信・</text>
    <text x="52" y="262" font-size="12" fill="#374151">インフラなど。</text>
    <line x1="52" y1="290" x2="252" y2="290" stroke="#dbeafe"/>
    <text x="52" y="312" font-size="11" font-weight="700" fill="#1e3a8a">該当例</text>
    <text x="52" y="334" font-size="12" fill="#1f2937">・花王</text>
    <text x="52" y="354" font-size="12" fill="#1f2937">・KDDI</text>
    <text x="52" y="374" font-size="12" fill="#1f2937">・沖縄セルラー電話</text>
    <text x="52" y="394" font-size="12" fill="#1f2937">・リンナイ</text>
  </g>

  <!-- Column 2 -->
  <g>
    <rect x="284" y="90" width="232" height="330" rx="10" fill="#ffffff" stroke="#34d399" stroke-width="2"/>
    <rect x="284" y="90" width="232" height="40" rx="10" fill="#34d399"/>
    <text x="400" y="116" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">参入障壁</text>
    <text x="400" y="152" text-anchor="middle" font-size="11" fill="#6b7280">Moat / Niche Position</text>
    <text x="300" y="180" font-size="12" fill="#374151">ニッチトップやプラット</text>
    <text x="300" y="198" font-size="12" fill="#374151">フォーム構造などで、</text>
    <text x="300" y="216" font-size="12" fill="#374151">他社が入り込みにくい</text>
    <text x="300" y="244" font-size="12" fill="#374151">独自のポジションを</text>
    <text x="300" y="262" font-size="12" fill="#374151">持っている。</text>
    <line x1="300" y1="290" x2="500" y2="290" stroke="#d1fae5"/>
    <text x="300" y="312" font-size="11" font-weight="700" fill="#065f46">該当例</text>
    <text x="300" y="334" font-size="12" fill="#1f2937">・ユー・エス・エス</text>
    <text x="300" y="354" font-size="12" fill="#1f2937">・SPK</text>
    <text x="300" y="374" font-size="12" fill="#1f2937">・リコーリース</text>
    <text x="300" y="394" font-size="12" fill="#1f2937">・ニトリホールディングス</text>
  </g>

  <!-- Column 3 -->
  <g>
    <rect x="532" y="90" width="232" height="330" rx="10" fill="#ffffff" stroke="#fbbf24" stroke-width="2"/>
    <rect x="532" y="90" width="232" height="40" rx="10" fill="#fbbf24"/>
    <text x="648" y="116" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">株主還元方針</text>
    <text x="648" y="152" text-anchor="middle" font-size="11" fill="#6b7280">Capital Return Policy</text>
    <text x="548" y="180" font-size="12" fill="#374151">累進配当・配当性向や</text>
    <text x="548" y="198" font-size="12" fill="#374151">DOEの数値コミット等、</text>
    <text x="548" y="216" font-size="12" fill="#374151">減配しにくい仕組みを</text>
    <text x="548" y="244" font-size="12" fill="#374151">経営方針として</text>
    <text x="548" y="262" font-size="12" fill="#374151">明示している。</text>
    <line x1="548" y1="290" x2="748" y2="290" stroke="#fef3c7"/>
    <text x="548" y="312" font-size="11" font-weight="700" fill="#92400e">該当例</text>
    <text x="548" y="334" font-size="12" fill="#1f2937">・三菱HCキャピタル</text>
    <text x="548" y="354" font-size="12" fill="#1f2937">・リコーリース</text>
    <text x="548" y="374" font-size="12" fill="#1f2937">・KDDI</text>
    <text x="548" y="394" font-size="12" fill="#1f2937">・三菱商事 など</text>
  </g>

  <text x="400" y="446" text-anchor="middle" font-size="11" fill="#9ca3af">※同じ企業が複数の特徴を持つこともあります（例：KDDI＝景気耐性＋株主還元方針）</text>
</svg>
