<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>エンキュー条件の修正前後</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #ffffff;
      font-family: "Hiragino Kaku Gothic Pro", "Noto Sans JP", "Yu Gothic", sans-serif;
      padding: 36px 28px 52px;
      width: 860px;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      color: #111827;
      margin-bottom: 36px;
    }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .panel-before {
      background: #fff1f2;
      border: 2px solid #f87171;
      border-radius: 14px;
      padding: 24px 20px 24px;
    }

    .panel-after {
      background: #f0fdf4;
      border: 2px solid #4ade80;
      border-radius: 14px;
      padding: 24px 20px 24px;
    }

    .panel-header-before {
      font-size: 20px;
      font-weight: bold;
      color: #dc2626;
      margin-bottom: 16px;
    }

    .panel-header-after {
      font-size: 20px;
      font-weight: bold;
      color: #16a34a;
      margin-bottom: 16px;
    }

    .condition-box {
      background: #ffffff;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: "Courier New", "Consolas", monospace;
      font-size: 15px;
      color: #1e293b;
      margin-bottom: 16px;
      word-break: break-all;
      line-height: 1.5;
    }

    .description {
      font-size: 15px;
      line-height: 1.75;
      color: #374151;
      margin-bottom: 20px;
    }

    /* タイムライン図 */
    .timeline-wrap {
      border-radius: 10px;
      padding: 16px 12px 48px;
      background: #ffffff;
      border: 1.5px solid #e5e7eb;
    }

    .timeline-label {
      font-size: 14px;
      font-weight: bold;
      color: #6b7280;
      margin-bottom: 10px;
      text-align: center;
    }

    .timeline-track {
      position: relative;
      height: 56px;
    }

    .axis-line {
      position: absolute;
      top: 28px;
      left: 0;
      right: 0;
      height: 2px;
      background: #d1d5db;
      border-radius: 1px;
    }

    .range-fill-before {
      position: absolute;
      top: 10px;
      left: 0;
      right: 32px;
      height: 36px;
      background: #fee2e2;
      border-radius: 6px;
      border: 1px solid #fca5a5;
    }

    .range-fill-after {
      position: absolute;
      top: 10px;
      right: 32px;
      width: 120px;
      height: 36px;
      background: #dcfce7;
      border-radius: 6px;
      border: 1px solid #86efac;
    }

    .range-grey {
      position: absolute;
      top: 10px;
      left: 0;
      right: 152px;
      height: 36px;
      background: #f3f4f6;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
    }

    .marker-now {
      position: absolute;
      top: 4px;
      right: 32px;
      width: 2px;
      height: 48px;
      background: #4b5563;
    }

    .marker-now-label {
      position: absolute;
      top: -20px;
      right: 33px;
      transform: translateX(50%);
      font-size: 13px;
      color: #1f2937;
      font-weight: bold;
      white-space: nowrap;
    }

    .marker-2h {
      position: absolute;
      top: 4px;
      right: 152px;
      width: 2px;
      height: 48px;
      border-left: 2px dashed #16a34a;
    }

    .marker-2h-label {
      position: absolute;
      top: -20px;
      right: 153px;
      transform: translateX(50%);
      font-size: 13px;
      color: #16a34a;
      font-weight: bold;
      white-space: nowrap;
    }

    .axis-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 13px;
      color: #9ca3af;
    }

    /* ドット（修正前） */
    .dots-wrap {
      position: absolute;
      top: 12px;
      left: 8px;
      right: 42px;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .dot-red {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #ef4444;
      flex-shrink: 0;
    }

    /* ドット（修正後） */
    .dots-wrap-after {
      position: absolute;
      top: 12px;
      right: 36px;
      width: 108px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
    }

    .dot-green {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #16a34a;
      flex-shrink: 0;
    }

    /* 対象外ラベル */
    .label-out-of-range {
      position: absolute;
      top: 50%;
      left: 12px;
      transform: translateY(-50%);
      font-size: 13px;
      color: #9ca3af;
      font-weight: bold;
    }

    /* 範囲説明ラベル（下） */
    .range-desc-before {
      position: absolute;
      bottom: -26px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: #dc2626;
      font-weight: bold;
      white-space: nowrap;
    }

    .range-desc-after {
      position: absolute;
      bottom: -26px;
      right: 28px;
      font-size: 13px;
      color: #16a34a;
      font-weight: bold;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="title">エンキュー条件の修正前後</div>

  <div class="columns">

    <!-- 修正前 -->
    <div class="panel-before">
      <div class="panel-header-before">❌ 修正前</div>
      <div class="condition-box">date ≤ 現在時刻</div>
      <div class="description">
        過去に公開されたすべての記事が対象。history ファイルに記録がない記事はすべて「未投稿」として一括エンキューされてしまう。
      </div>

      <div class="timeline-wrap">
        <div class="timeline-label">対象範囲</div>
        <div class="timeline-track">
          <div class="range-fill-before">
            <div class="dots-wrap">
              <div class="dot-red"></div><div class="dot-red"></div><div class="dot-red"></div>
              <div class="dot-red"></div><div class="dot-red"></div><div class="dot-red"></div>
              <div class="dot-red"></div><div class="dot-red"></div><div class="dot-red"></div>
              <div class="dot-red"></div><div class="dot-red"></div><div class="dot-red"></div>
              <div class="dot-red"></div><div class="dot-red"></div><div class="dot-red"></div>
              <div class="dot-red"></div><div class="dot-red"></div><div class="dot-red"></div>
              <div class="dot-red"></div><div class="dot-red"></div><div class="dot-red"></div>
              <div class="dot-red"></div><div class="dot-red"></div><div class="dot-red"></div>
              <div class="dot-red"></div><div class="dot-red"></div><div class="dot-red"></div>
              <div class="dot-red"></div><div class="dot-red"></div><div class="dot-red"></div>
            </div>
          </div>
          <div class="axis-line"></div>
          <div class="marker-now"></div>
          <div class="marker-now-label">現在時刻</div>
          <div class="range-desc-before">← 過去記事（数十件）すべてが対象 →</div>
        </div>
        <div class="axis-labels">
          <span>過去</span>
          <span>現在 →</span>
        </div>
      </div>
    </div>

    <!-- 修正後 -->
    <div class="panel-after">
      <div class="panel-header-after">✅ 修正後</div>
      <div class="condition-box">現在時刻 − 2時間 &lt; date ≤ 現在時刻</div>
      <div class="description">
        直近2時間以内に公開日時が到来した記事のみ対象。一括エンキューを防ぎつつ、GitHub Actions の遅延バッファ（最大十数分）も考慮した設定。
      </div>

      <div class="timeline-wrap">
        <div class="timeline-label">対象範囲</div>
        <div class="timeline-track">
          <div class="range-grey">
            <div class="label-out-of-range">対象外</div>
          </div>
          <div class="range-fill-after">
            <div class="dots-wrap-after">
              <div class="dot-green"></div>
              <div class="dot-green"></div>
              <div class="dot-green"></div>
            </div>
          </div>
          <div class="axis-line"></div>
          <div class="marker-2h"></div>
          <div class="marker-2h-label">2時間前</div>
          <div class="marker-now"></div>
          <div class="marker-now-label">現在時刻</div>
          <div class="range-desc-after">直近2時間のみ</div>
        </div>
        <div class="axis-labels">
          <span>過去</span>
          <span>現在 →</span>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
