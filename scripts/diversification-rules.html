<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  html,body{margin:0;padding:0;}
  #stage{width:1376px;height:768px;background:#FFFFFF;
    font-family:"Yu Gothic UI","Yu Gothic","Meiryo","Noto Sans JP",sans-serif;}
  svg{display:block;}
  .title{font-size:34px;font-weight:800;fill:#0F172A;}
  .sub{font-size:22px;font-weight:500;fill:#64748B;}
  .rule{font-size:30px;font-weight:800;}
  .rnum{font-size:25px;font-weight:800;fill:#FFFFFF;}
  .desc{font-size:21px;font-weight:600;fill:#334155;}
  .barlbl{font-size:20px;font-weight:700;fill:#0F172A;}
  .barval{font-size:19px;font-weight:800;}
  .cap{font-size:20px;font-weight:700;fill:#DC2626;}
</style>
</head>
<body>
<div id="stage"><svg id="svg" width="1376" height="768" viewBox="0 0 1376 768"></svg></div>
<script>
const NS="http://www.w3.org/2000/svg";const svg=document.getElementById("svg");
function add(t,a,x){const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);if(x!=null)e.textContent=x;svg.appendChild(e);return e;}

add("text",{x:60,y:60,class:"title"},"減配に強いポートフォリオの分散ルール");
add("text",{x:60,y:92,class:"sub"},"評価額ではなく「配当金の割合」で上限を管理する。1銘柄や1業種の減配が、収入全体を揺らさないために");

// ===== Rule 1: 1銘柄 < 3% =====
add("rect",{x:60,y:135,width:1256,height:255,rx:18,fill:"#F0FDF4",stroke:"#86EFAC","stroke-width":2.5});
add("circle",{cx:108,cy:183,r:26,fill:"#16A34A"});
add("text",{x:108,y:192,"text-anchor":"middle",class:"rnum"},"1");
add("text",{x:150,y:192,class:"rule",fill:"#15803D"},"1銘柄あたりの配当金割合は 3% 未満");
add("text",{x:150,y:228,class:"desc"},"1社が減配・無配になっても、配当収入全体への打撃を小さく抑える");

// bar for rule1: scale where 3% cap is at x marker
const BX=150, BW=1000, R1MAX=4.0, r1s=BW/R1MAX;
const by1=270;
add("text",{x:BX,y:by1-12,class:"barlbl"},"主要銘柄の配当金割合（目安3%）");
// gridline at 3%
const cap1x=BX+3*r1s;
add("line",{x1:cap1x,y1:by1-6,x2:cap1x,y2:by1+96,stroke:"#DC2626","stroke-width":2.5,"stroke-dasharray":"7 5"});
add("text",{x:cap1x+8,y:by1-12,class:"cap"},"上限3%");
const stocks=[["SBI HD",3.35],["三菱商事",2.13],["アステラス",1.93],["INPEX",1.90]];
stocks.forEach((s,i)=>{
  const y=by1+i*24, w=s[1]*r1s;
  add("text",{x:BX-10,y:y+15,"text-anchor":"end",style:"font-size:16px;font-weight:700;fill:#334155"},s[0]);
  add("rect",{x:BX,y:y+2,width:w,height:16,rx:3,fill:s[1]>3?"#F59E0B":"#16A34A"});
  add("text",{x:BX+w+8,y:y+15,class:"barval",fill:s[1]>3?"#B45309":"#15803D"},s[1].toFixed(2)+"%");
});
add("text",{x:BX,y:by1+118,style:"font-size:16px;font-weight:600;fill:#64748B"},"※ 最大のSBIでも3.35%。1銘柄が突出しないよう管理（一時的な超過は許容）");

// ===== Rule 2: 1セクター < 15% =====
add("rect",{x:60,y:410,width:610,height:300,rx:18,fill:"#EFF6FF",stroke:"#93C5FD","stroke-width":2.5});
add("circle",{cx:108,cy:458,r:26,fill:"#2563EB"});
add("text",{x:108,y:467,"text-anchor":"middle",class:"rnum"},"2");
add("text",{x:150,y:467,class:"rule",fill:"#1D4ED8"},"1セクター 15% 未満");
add("text",{x:92,y:506,class:"desc"},"1業種への偏りを抑える。24業種に分散し、");
add("text",{x:92,y:534,class:"desc"},"最大でも情報・通信業の12.1%にとどめる");
// mini bar
const SBX=110,SBW=480;
const smax=18, ss=SBW/smax, sby=570;
const cap2x=SBX+15*ss;
add("line",{x1:cap2x,y1:sby-6,x2:cap2x,y2:sby+96,stroke:"#DC2626","stroke-width":2.5,"stroke-dasharray":"7 5"});
add("text",{x:cap2x-8,y:sby-12,"text-anchor":"end",class:"cap"},"上限15%");
const secs=[["情報・通信",12.1],["サービス",9.1],["卸売",8.9]];
secs.forEach((s,i)=>{
  const y=sby+i*26,w=s[1]*ss;
  add("text",{x:SBX-8,y:y+16,"text-anchor":"end",style:"font-size:15px;font-weight:700;fill:#334155"},s[0]);
  add("rect",{x:SBX,y:y+3,width:w,height:16,rx:3,fill:"#2563EB"});
  add("text",{x:SBX+w+8,y:y+16,style:"font-size:16px;font-weight:800;fill:#1D4ED8"},s[1].toFixed(1)+"%");
});

// ===== Rule 3: ディフェンシブ50%以上 =====
add("rect",{x:706,y:410,width:610,height:300,rx:18,fill:"#FFFBEB",stroke:"#FCD34D","stroke-width":2.5});
add("circle",{cx:754,cy:458,r:26,fill:"#D97706"});
add("text",{x:754,y:467,"text-anchor":"middle",class:"rnum"},"3");
add("text",{x:796,y:467,class:"rule",fill:"#B45309"},"ディフェンシブ 50% 以上");
add("text",{x:738,y:506,class:"desc"},"不況に強い業種を配当金ベースで半分以上に。");
add("text",{x:738,y:534,class:"desc"},"現在はディフェンシブ51.7%：景気敏感48.3%");
// stacked bar
const DX=738,DW=540,dby=575,dh=44;
const defp=51.7;
add("rect",{x:DX,y:dby,width:DW*defp/100,height:dh,rx:6,fill:"#16A34A"});
add("rect",{x:DX+DW*defp/100,y:dby,width:DW*(100-defp)/100,height:dh,rx:6,fill:"#FCA5A5"});
add("text",{x:DX+DW*defp/200,y:dby+29,"text-anchor":"middle",style:"font-size:20px;font-weight:800;fill:#FFFFFF"},"ディフェンシブ 51.7%");
add("text",{x:DX+DW*defp/100+DW*(100-defp)/200,y:dby+29,"text-anchor":"middle",style:"font-size:17px;font-weight:800;fill:#7F1D1D"},"景気敏感 48.3%");
// 50% line
const half=DX+DW*0.5;
add("line",{x1:half,y1:dby-8,x2:half,y2:dby+dh+8,stroke:"#DC2626","stroke-width":2.5,"stroke-dasharray":"7 5"});
add("text",{x:half,y:dby+dh+30,"text-anchor":"middle",class:"cap"},"50%ライン");
</script>
</body>
</html>
