<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" role="img" aria-label="増配株を選ぶ際の5つのチェックポイント">
  <rect width="800" height="460" fill="#fafafa"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2937">増配株を選ぶ5つのチェックポイント</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#6b7280">テーマや相場環境ではなく、企業の「中身」で判断する</text>

  <!-- Card style -->
  <defs>
    <style>
      .card { fill:#ffffff; stroke:#dbeafe; stroke-width:1.5; }
      .badge { fill:#2563eb; }
      .badgeText { fill:#ffffff; font-size:18px; font-weight:700; text-anchor:middle; }
      .title { fill:#1e3a8a; font-size:15px; font-weight:700; }
      .body  { fill:#374151; font-size:12px; }
    </style>
  </defs>

  <!-- Row 1: 3 cards -->
  <g>
    <rect class="card" x="40"  y="90" width="230" height="150" rx="10"/>
    <circle class="badge" cx="72" cy="122" r="20"/>
    <text class="badgeText" x="72" y="128">1</text>
    <text class="title" x="104" y="118">配当性向</text>
    <text class="title" x="104" y="138">は適切か</text>
    <text class="body" x="56" y="172">利益のうち何%を配当に</text>
    <text class="body" x="56" y="190">回しているか。30〜50%</text>
    <text class="body" x="56" y="208">なら増配余力あり。90%</text>
    <text class="body" x="56" y="226">超は減配リスク高。</text>
  </g>

  <g>
    <rect class="card" x="285" y="90" width="230" height="150" rx="10"/>
    <circle class="badge" cx="317" cy="122" r="20"/>
    <text class="badgeText" x="317" y="128">2</text>
    <text class="title" x="349" y="118">増配の原資は</text>
    <text class="title" x="349" y="138">業績成長か</text>
    <text class="body" x="301" y="172">利益そのものが伸びてい</text>
    <text class="body" x="301" y="190">るか。配当性向の切り上げ</text>
    <text class="body" x="301" y="208">だけに頼った増配はいず</text>
    <text class="body" x="301" y="226">れ限界を迎える。</text>
  </g>

  <g>
    <rect class="card" x="530" y="90" width="230" height="150" rx="10"/>
    <circle class="badge" cx="562" cy="122" r="20"/>
    <text class="badgeText" x="562" y="128">3</text>
    <text class="title" x="594" y="118">業績の</text>
    <text class="title" x="594" y="138">安定性</text>
    <text class="body" x="546" y="172">過去10年の売上・営業利</text>
    <text class="body" x="546" y="190">益のトレンドを確認。需要</text>
    <text class="body" x="546" y="208">が安定したセクターほど</text>
    <text class="body" x="546" y="226">増配を維持しやすい。</text>
  </g>

  <!-- Row 2: 2 cards centered -->
  <g>
    <rect class="card" x="160" y="265" width="230" height="160" rx="10"/>
    <circle class="badge" cx="192" cy="297" r="20"/>
    <text class="badgeText" x="192" y="303">4</text>
    <text class="title" x="224" y="293">財務</text>
    <text class="title" x="224" y="313">健全性</text>
    <text class="body" x="176" y="347">自己資本比率60%以上</text>
    <text class="body" x="176" y="365">（理想70%以上）が目安。</text>
    <text class="body" x="176" y="383">ただし銀行・保険・不動産</text>
    <text class="body" x="176" y="401">など業種特性は考慮。</text>
  </g>

  <g>
    <rect class="card" x="410" y="265" width="230" height="160" rx="10"/>
    <circle class="badge" cx="442" cy="297" r="20"/>
    <text class="badgeText" x="442" y="303">5</text>
    <text class="title" x="474" y="293">減配履歴の</text>
    <text class="title" x="474" y="313">有無</text>
    <text class="body" x="426" y="347">「増配が止まっても減ら</text>
    <text class="body" x="426" y="365">していない」企業を重視。</text>
    <text class="body" x="426" y="383">過去の減配・無配転落は</text>
    <text class="body" x="426" y="401">将来の警戒シグナル。</text>
  </g>

  <!-- Footer -->
  <text x="400" y="448" text-anchor="middle" font-size="11" fill="#9ca3af">※相場テーマで基準を緩めない／業種特性は補足条件として扱う</text>
</svg>
