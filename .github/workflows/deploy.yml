name: Deploy to Cloudflare Pages

# 単一ブランチ運用：main への push で本番＋ドラフト2サイトを同時デプロイ
# - content/posts/  → finlab-se.com（本番）
# - content/drafts/ → draft.finlab-se.pages.dev（確認用）
#
# ドラフトはビルド時にだけ content/posts/ にスワップしてレンダリングするため、
# 本番と全く同じレイアウト/URLで確認できる。

on:
  push:
    branches:
      - main
  # 定時再ビルド：未来日付（5:30公開予約）の記事を公開するため、
  # Cloudflare Worker (workers/x-post-trigger) が毎朝 5:35 JST（救済枠 6:35 JST）に
  # workflow_dispatch でこのワークフローを起動する。
  # GitHub Actions の schedule cron は遅延・スキップが常態化しているため使用しない
  # （2026-06-13 設計変更。enqueue の時間窓は 2時間＝5:30 公開を 7:30 までカバー）。
  # 手動トリガー：GitHub Actions 画面や gh workflow run からの即時再ビルドも同じ経路で動く
  workflow_dispatch:

jobs:
  # =========================================
  # 本番サイト（finlab-se.com）
  # content/posts/ のみビルド。content/drafts/ は除外。
  # =========================================
  production:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # cron 時に x-queue.yaml をコミット・プッシュするため write が必要
      deployments: write
      issues: write     # 失敗時の automation-error Issue 作成用
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.1'
          extended: true

      - name: Remove drafts directory (production must not include drafts)
        run: rm -rf content/drafts

      - name: Build production
        # 本番は --buildFuture を付けない＝Hugo標準の予約投稿挙動を活かす：
        # date が現在時刻より未来の記事は除外。毎朝 5:35 JST の Worker 起動ビルドにより、
        # 予約時刻（5:30）に達した記事が自動公開される。
        run: hugo --baseURL "https://finlab-se.com"

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 75e7d9321a61105da05ceb29523b8a30
          command: pages deploy public --project-name finlab-se --branch master

      # =========================================
      # 定時起動（workflow_dispatch）時のみ: 公開日に達した記事を X キューに積む
      #
      # push 時は x-new-post-enqueue.yml が date チェック付きでエンキューする。
      # Worker からの定時起動時: Hugo が未来日付記事を初めて本番に含めたタイミングで
      # エンキューする。enqueue_post.py は queue・history の両方で重複チェックするため
      # 再エンキューや投稿済み記事の再投稿は発生しない。
      # =========================================
      - name: Enqueue newly-live posts (dispatch only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          pip install ruamel.yaml -q
          python3 - << 'PYEOF'
          import sys, re, subprocess
          from datetime import datetime, timezone, timedelta
          from pathlib import Path

          JST = timezone(timedelta(hours=9))
          now = datetime.now(JST)
          # 起動は 5:35 JST（救済 6:35 JST）。窓2時間で両方をカバーする
          ENQUEUE_WINDOW_HOURS = 2
          window_start = now - timedelta(hours=ENQUEUE_WINDOW_HOURS)
          posts_dir = Path("content/posts")

          if not posts_dir.exists():
              print("content/posts not found, skipping")
              sys.exit(0)

          for md_file in sorted(posts_dir.glob("*.md")):
              content = md_file.read_text(encoding="utf-8")
              m = re.search(r'^date:\s*["\']?([^\n"\']+)["\']?', content, re.MULTILINE)
              if not m:
                  continue
              date_str = m.group(1).strip()
              dt = None
              for fmt in ["%Y-%m-%dT%H:%M:%S%z", "%Y-%m-%dT%H:%M%z"]:
                  try:
                      dt = datetime.strptime(date_str, fmt)
                      break
                  except ValueError:
                      pass
              if dt is None:
                  try:
                      d = datetime.strptime(date_str[:10], "%Y-%m-%d").date()
                      dt = datetime(d.year, d.month, d.day, tzinfo=JST)
                  except ValueError:
                      continue
              if window_start < dt <= now:
                  r = subprocess.run(
                      [sys.executable, ".github/scripts/enqueue_post.py", str(md_file)],
                      capture_output=True, text=True
                  )
                  msg = r.stdout.strip()
                  if msg:
                      print(f"{md_file.name}: {msg}")
          PYEOF

      - name: Commit newly-enqueued posts (dispatch only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/x-queue.yaml 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(x-queue): enqueue newly-live post(s) [skip ci]"
            git push
            echo "Newly-live post(s) enqueued and pushed."
          else
            echo "No new posts to enqueue."
          fi

      - name: Report job failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python3 .github/scripts/report_automation_error.py \
            --workflow deploy \
            --slot production \
            --job-status failure \
            --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" || true

  # =========================================
  # ドラフトプレビュー（draft.finlab-se.pages.dev）
  # content/drafts/ のみをビルド。本番posts/は除外。
  # ビルド前に drafts/ を posts/ にリネームすることで、
  # URLレイアウトを本番と完全一致させる。
  # =========================================
  draft-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.1'
          extended: true

      - name: Swap drafts → posts (draft preview shows ONLY drafts)
        run: |
          rm -rf content/posts
          if [ -d content/drafts ]; then
            mv content/drafts content/posts
          else
            mkdir -p content/posts
          fi

      - name: Build draft preview
        run: hugo --buildDrafts --buildFuture --environment draft

      - name: Block search engines on draft site
        # Draftサイトは公開前の下書き置き場なので、検索エンジンにインデックスされないようにする
        # - _headers: Cloudflare Pages が読み取り、X-Robots-Tag ヘッダを全レスポンスに付与（Googleが強く尊重）
        # - robots.txt: 行儀の良いクローラをそもそもクロールさせない
        run: |
          cat > public/_headers <<'EOF'
          /*
            X-Robots-Tag: noindex, nofollow
          EOF
          cat > public/robots.txt <<'EOF'
          User-agent: *
          Disallow: /
          EOF

      - name: Deploy to Cloudflare Pages (draft)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 75e7d9321a61105da05ceb29523b8a30
          command: pages deploy public --project-name finlab-se --branch draft
