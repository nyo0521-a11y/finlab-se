<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" role="img" aria-label="累進配当に関する5つの表現を強度と具体性の2軸でマッピングした図">
  <rect width="800" height="500" fill="#fafafa"/>

  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2937">累進配当に近い5つの表現：強度と具体性で読み分ける</text>
  <text x="400" y="54" text-anchor="middle" font-size="13" fill="#6b7280">縦軸＝下限額・配当性向の数値が示されているか／横軸＝減配しない約束の強さ</text>

  <!-- Plot area -->
  <rect x="120" y="90" width="560" height="320" fill="#ffffff" stroke="#e5e7eb"/>

  <!-- Quadrant background tinting -->
  <rect x="400" y="90" width="280" height="160" fill="#dbeafe" opacity="0.5"/>
  <rect x="120" y="250" width="280" height="160" fill="#fef3c7" opacity="0.5"/>

  <!-- Axes -->
  <line x1="120" y1="410" x2="680" y2="410" stroke="#374151" stroke-width="1.5"/>
  <line x1="120" y1="90" x2="120" y2="410" stroke="#374151" stroke-width="1.5"/>
  <!-- Center cross lines -->
  <line x1="400" y1="90" x2="400" y2="410" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="120" y1="250" x2="680" y2="250" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Axis labels -->
  <text x="400" y="438" text-anchor="middle" font-size="13" fill="#374151">減配しない約束の強さ →</text>
  <text x="100" y="86" text-anchor="middle" font-size="11" fill="#6b7280">具体性</text>
  <text x="100" y="100" text-anchor="middle" font-size="11" fill="#6b7280">↑高</text>
  <text x="100" y="406" text-anchor="middle" font-size="11" fill="#6b7280">↓低</text>
  <text x="124" y="425" text-anchor="start" font-size="11" fill="#6b7280">弱</text>
  <text x="676" y="425" text-anchor="end" font-size="11" fill="#6b7280">強</text>

  <!-- Quadrant labels (subtle) -->
  <text x="540" y="120" text-anchor="middle" font-size="11" fill="#1d4ed8" font-weight="700" opacity="0.7">理想ゾーン（強い公約＋具体的な数字）</text>
  <text x="260" y="395" text-anchor="middle" font-size="11" fill="#92400e" font-weight="700" opacity="0.7">注意ゾーン（弱い表現＋曖昧）</text>

  <!-- Plot points -->
  <!-- 下限配当: 右上 -->
  <g>
    <circle cx="600" cy="160" r="14" fill="#1d4ed8"/>
    <text x="600" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">下</text>
    <text x="620" y="155" font-size="13" font-weight="700" fill="#1f2937">下限配当</text>
    <text x="620" y="172" font-size="11" fill="#6b7280">「最低○円」を明示</text>
  </g>
  <!-- 累進配当: 右上中 -->
  <g>
    <circle cx="510" cy="200" r="14" fill="#2563eb"/>
    <text x="510" y="205" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">累</text>
    <text x="528" y="195" font-size="13" font-weight="700" fill="#1f2937">累進配当</text>
    <text x="528" y="212" font-size="11" fill="#6b7280">減配せず維持・増配</text>
  </g>
  <!-- 累進的配当: 累進配当のすぐ近く -->
  <g>
    <circle cx="475" cy="240" r="12" fill="#3b82f6"/>
    <text x="475" y="245" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">累的</text>
    <text x="490" y="235" font-size="13" font-weight="700" fill="#1f2937">累進的配当</text>
    <text x="490" y="252" font-size="11" fill="#6b7280">累進配当とほぼ同義</text>
  </g>
  <!-- 配当性向○%目安: 中央下 -->
  <g>
    <circle cx="380" cy="320" r="14" fill="#fb923c"/>
    <text x="380" y="325" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">性向</text>
    <text x="395" y="315" font-size="13" font-weight="700" fill="#1f2937">配当性向○%目安</text>
    <text x="395" y="332" font-size="11" fill="#6b7280">利益が下がれば配当も下がる</text>
  </g>
  <!-- 安定配当: 左下 -->
  <g>
    <circle cx="220" cy="370" r="14" fill="#fbbf24"/>
    <text x="220" y="375" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">安</text>
    <text x="240" y="365" font-size="13" font-weight="700" fill="#1f2937">安定配当</text>
    <text x="240" y="382" font-size="11" fill="#6b7280">"努力目標" に近い表現が多い</text>
  </g>

  <!-- Bottom note -->
  <text x="400" y="476" text-anchor="middle" font-size="12" fill="#374151">「累進配当」と書いてあるかではなく、<tspan font-weight="700">下限額・配当性向の数値コミットが示されているか</tspan>を見るのが実用的</text>
</svg>
